<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galerie — Sistema de Gestión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
      onSnapshot, query, orderBy, serverTimestamp, getDocs }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAv3zzT62Z7hyqRuOz1DGwAVyUTYMszPoA",
      authDomain: "galerie-a5162.firebaseapp.com",
      projectId: "galerie-a5162",
      storageBucket: "galerie-a5162.firebasestorage.app",
      messagingSenderId: "85043850171",
      appId: "1:85043850171:web:1d4c322cd6dcc3a698f29e"
    };
    let app, auth, db;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch(e) { console.warn("Firebase init failed — demo mode"); }
    window.__fb = { auth, db, signInWithEmailAndPassword, signOut, onAuthStateChanged,
      collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs };
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:#f0eeeb;font-family:'Poppins',sans-serif;font-weight:300;color:#262626;min-height:100vh;}
    #root{min-height:100vh;}
    ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#f0eeeb;}::-webkit-scrollbar-thumb{background:#b1ada2;}

    /* STICKY */
    .sticky-shell{position:sticky;top:0;z-index:200;}
    .hdr{background:#262626;height:58px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #b1ada2;}
    .hdr-logo{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:16px;letter-spacing:6px;color:#e5e3e0;text-transform:uppercase;cursor:pointer;}
    .hdr-right{display:flex;align-items:center;gap:12px;}
    .hdr-pill{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:#b1ada2;border:1px solid #b1ada244;padding:4px 10px;}
    .hdr-user{font-size:10px;color:#818181;}
    .btn-logout{background:transparent;border:1px solid #3a3a3a;color:#818181;padding:5px 11px;font-size:8px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Poppins',sans-serif;transition:all .15s;}
    .btn-logout:hover{border-color:#818181;color:#e5e3e0;}
    .nav{background:#1e1e1e;border-bottom:1px solid #2a2a2a;display:flex;overflow-x:auto;}
    .nav-item{padding:0 20px;height:40px;display:flex;align-items:center;gap:6px;font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:#818181;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;font-family:'Poppins',sans-serif;}
    .nav-item:hover{color:#b1ada2;}
    .nav-item.active{color:#e5e3e0;border-bottom-color:#b1ada2;}
    .nav-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

    /* ALERT BELL */
    .alert-bell-wrap{position:relative;}
    .alert-bell{position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;transition:background .15s;opacity:.45;}
    .alert-bell:hover{background:rgba(255,255,255,.08);opacity:.8;}
    .alert-bell.has-overdue{opacity:1;}
    .alert-bell.has-upcoming{opacity:.85;}
    .alert-bell-icon{font-size:17px;line-height:1;user-select:none;}
    .alert-bell.has-overdue .alert-bell-icon{animation:bellshake .45s ease infinite alternate;}
    @keyframes bellshake{0%{transform:rotate(-14deg);}100%{transform:rotate(14deg);}}
    .alert-bubble{position:absolute;top:1px;right:1px;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;padding:0 4px;border:2px solid #262626;line-height:1;}
    .alert-bubble.overdue{background:#e74c3c;color:#fff;}
    .alert-bubble.upcoming{background:#f39c12;color:#fff;}

    /* ALERT PANEL DROPDOWN */
    .alert-panel{position:absolute;top:calc(100% + 10px);right:0;width:360px;background:#1e1e1e;border:1px solid #3a3a3a;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:999;overflow:hidden;}
    .alert-panel-hdr{background:#262626;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #3a3a3a;}
    .alert-panel-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#e5e3e0;}
    .alert-panel-count{font-size:9px;color:#818181;}
    .alert-panel-body{max-height:420px;overflow-y:auto;}
    .alert-panel-empty{padding:32px 16px;text-align:center;color:#818181;font-size:12px;}
    .alert-panel-empty-icon{font-size:28px;margin-bottom:8px;opacity:.4;}
    .alert-item{padding:12px 16px;border-bottom:1px solid #2a2a2a;cursor:pointer;transition:background .12s;}
    .alert-item:last-child{border-bottom:none;}
    .alert-item:hover{background:#262626;}
    .alert-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:8px;}
    .alert-item-proyecto{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:11px;color:#e5e3e0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .alert-item-date{font-size:9px;font-family:'Poppins',sans-serif;padding:2px 7px;border-radius:2px;white-space:nowrap;flex-shrink:0;}
    .alert-item-date.overdue{background:#e74c3c22;color:#e74c3c;border:1px solid #e74c3c44;}
    .alert-item-date.upcoming{background:#f39c1222;color:#f39c12;border:1px solid #f39c1244;}
    .alert-item-texto{font-size:11px;color:#818181;line-height:1.4;}
    .alert-item-feria{font-size:9px;color:#3a3a3a;margin-top:3px;letter-spacing:.5px;}
    .alert-panel-footer{padding:10px 16px;border-top:1px solid #3a3a3a;background:#262626;}
    .alert-panel-link{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#b1ada2;font-family:'Poppins',sans-serif;cursor:pointer;text-align:center;display:block;}
    .alert-panel-link:hover{color:#e5e3e0;}

    /* ALERT BANNER */
    .alert-banner{background:#f39c1215;border-bottom:2px solid #f39c12;padding:10px 32px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s;}
    .alert-banner:hover{background:#f39c1225;}
    .alert-icon{font-size:14px;}
    .alert-text{font-size:11px;color:#262626;flex:1;}
    .alert-text strong{color:#f39c12;font-family:'Plus Jakarta Sans',sans-serif;}
    .alert-badge{background:#f39c12;color:#fff;font-size:8px;letter-spacing:2px;font-family:'Poppins',sans-serif;padding:3px 8px;border-radius:2px;white-space:nowrap;}

    /* LOGIN */
    .login-wrap{min-height:100vh;background:#262626;display:flex;align-items:center;justify-content:center;}
    .login-box{width:360px;}
    .login-logo{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:26px;letter-spacing:8px;color:#e5e3e0;text-align:center;margin-bottom:6px;}
    .login-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#818181;text-align:center;margin-bottom:44px;}
    .login-field{margin-bottom:12px;}
    .login-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:#818181;display:block;margin-bottom:5px;}
    .login-input{width:100%;background:#1a1a1a;border:1px solid #3a3a3a;color:#e5e3e0;padding:12px 14px;font-family:'Poppins',sans-serif;font-size:13px;outline:none;border-radius:0;}
    .login-input:focus{border-color:#b1ada2;}
    .login-btn{width:100%;background:#e5e3e0;color:#262626;border:none;padding:15px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:10px;letter-spacing:4px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:opacity .15s;}
    .login-btn:hover{opacity:.88;}
    .login-error{background:#3a1a1a;border:1px solid #e74c3c44;color:#e74c3c;padding:10px 14px;font-size:11px;margin-top:10px;text-align:center;}

    /* LAYOUT */
    .page{max-width:1060px;margin:0 auto;padding:24px 18px 80px;}
    .page-wide{max-width:1280px;margin:0 auto;padding:24px 18px 80px;}
    .hero{background:#262626;padding:28px 32px 22px;}
    .hero-ey{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:#b1ada2;margin-bottom:5px;}
    .hero-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:26px;color:#e5e3e0;line-height:1.1;}
    .hero-sub{font-size:11px;color:#818181;margin-top:5px;}

    /* CARDS */
    .card{background:#fff;border:1px solid #e5e3e0;margin-bottom:12px;}
    .card-hdr{background:#f0eeeb;padding:12px 20px;border-bottom:1px solid #e5e3e0;display:flex;align-items:center;justify-content:space-between;}
    .card-hdr-left{display:flex;align-items:center;gap:10px;}
    .step{width:22px;height:22px;background:#262626;color:#e5e3e0;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .card-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#262626;}
    .card-body{padding:18px 20px;}

    /* STATS */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
    .stat-card{background:#fff;border:1px solid #e5e3e0;padding:16px 18px;}
    .stat-lbl{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:#818181;margin-bottom:7px;}
    .stat-val{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:24px;color:#262626;line-height:1;}
    .stat-sub{font-size:10px;color:#b1ada2;margin-top:4px;}
    .stat-card.dark{background:#262626;}.stat-card.dark .stat-lbl{color:#818181;}.stat-card.dark .stat-val{color:#e5e3e0;}.stat-card.dark .stat-sub{color:#818181;}
    .stat-card.green{border-left:3px solid #2ecc71;}.stat-card.gold{border-left:3px solid #f39c12;}.stat-card.red{border-left:3px solid #e74c3c;}

    /* FERIA CARDS */
    .feria-card{background:#fff;border:1px solid #e5e3e0;margin-bottom:10px;overflow:hidden;}
    .feria-hdr{background:#262626;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;}
    .feria-name{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:13px;color:#e5e3e0;}
    .feria-meta{font-size:10px;color:#818181;margin-top:2px;}
    .feria-stats{display:flex;gap:16px;align-items:center;}
    .feria-stat{text-align:right;}
    .feria-stat-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#818181;}
    .feria-stat-val{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12px;color:#e5e3e0;}
    .feria-body{padding:12px 20px;}
    .clients-list{display:flex;flex-direction:column;gap:6px;}
    .client-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#f0eeeb;border:1px solid #e5e3e0;}
    .client-name-big{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12px;}
    .client-meta-sm{font-size:10px;color:#818181;margin-top:1px;}
    .saving-badge{background:#f39c1222;border:1px solid #f39c1244;color:#f39c12;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;}

    /* CODE CHIP */
    .code-chip{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:9px;letter-spacing:2px;background:#262626;color:#e5e3e0;padding:3px 8px;display:inline-block;}
    .code-chip.client{background:#e67e2222;color:#e67e22;border:1px solid #e67e2244;}
    .code-chip.project{background:#3498db22;color:#3498db;border:1px solid #3498db44;}
    .code-chip.supplier{background:#9b59b622;color:#9b59b6;border:1px solid #9b59b644;}

    /* PIPELINE */
    .pipeline{display:flex;gap:0;margin-bottom:20px;overflow-x:auto;}
    .pipe-stage{flex:1;min-width:90px;border:1px solid #e5e3e0;border-right:none;background:#fff;padding:10px 12px;position:relative;}
    .pipe-stage:last-child{border-right:1px solid #e5e3e0;}
    .pipe-stage::after{content:'›';position:absolute;right:-8px;top:50%;transform:translateY(-50%);font-size:13px;color:#b1ada2;z-index:1;}
    .pipe-stage:last-child::after{display:none;}
    .pipe-lbl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:#818181;margin-bottom:3px;}
    .pipe-count{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:20px;color:#262626;}

    /* TABLE */
    .tbl{width:100%;border-collapse:collapse;}
    .tbl th{background:#f0eeeb;padding:8px 12px;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#818181;text-align:left;border-bottom:1px solid #e5e3e0;font-family:'Poppins',sans-serif;font-weight:500;}
    .tbl td{padding:10px 12px;border-bottom:1px solid #f0eeeb;font-size:12px;}
    .tbl tr:hover td{background:#fafaf9;}
    .tbl tr:last-child td{border-bottom:none;}
    .tbl-actions{display:flex;gap:5px;}

    /* BADGES */
    .badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;font-family:'Poppins',sans-serif;border:1px solid;white-space:nowrap;}
    .badge-exploracion{background:#f0eeeb;border-color:#b1ada2;color:#818181;}
    .badge-contacto{background:#fff8e6;border-color:#f39c1266;color:#f39c12;}
    .badge-diseno{background:#e6f0ff;border-color:#3498db44;color:#3498db;}
    .badge-planos{background:#f0e6ff;border-color:#8e44ad44;color:#8e44ad;}
    .badge-cotizacion{background:#fef9e6;border-color:#d4ac0d44;color:#d4ac0d;}
    .badge-negociacion{background:#fff3e6;border-color:#e67e2244;color:#e67e22;}
    .badge-aceptado{background:#e6ffe6;border-color:#2ecc7144;color:#2ecc71;}
    .badge-produccion{background:#fff3e6;border-color:#e67e2244;color:#e67e22;}
    .badge-completado{background:#262626;border-color:#262626;color:#e5e3e0;}
    .badge-no_aceptado{background:#ffe6e6;border-color:#e74c3c44;color:#e74c3c;}

    /* STAGE TRACKER */
    .stage-track{display:flex;align-items:flex-start;overflow-x:auto;padding-bottom:4px;gap:0;}
    .stage-item{flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;cursor:pointer;}
    .stage-item::after{content:'';position:absolute;top:9px;left:calc(50% + 10px);right:calc(-50% + 10px);height:2px;background:#e5e3e0;z-index:0;}
    .stage-item:last-child::after{display:none;}
    .stage-dot{width:18px;height:18px;border-radius:50%;border:2px solid #e5e3e0;background:#fff;z-index:1;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;transition:all .2s;flex-shrink:0;}
    .stage-dot.done{background:#2ecc71;border-color:#2ecc71;color:#fff;}
    .stage-dot.current{background:#262626;border-color:#262626;color:#fff;}
    .stage-dot.failed{background:#e74c3c;border-color:#e74c3c;color:#fff;}
    .stage-lbl{font-size:6px;letter-spacing:1px;text-transform:uppercase;color:#818181;text-align:center;line-height:1.3;}
    .stage-item.done .stage-lbl{color:#2ecc71;}
    .stage-item.current .stage-lbl{color:#262626;font-weight:600;}

    /* FORMS */
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
    .g4{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:12px;}
    .fg{display:flex;flex-direction:column;gap:4px;}
    label{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:#818181;font-weight:500;font-family:'Poppins',sans-serif;}
    input,select,textarea{font-family:'Poppins',sans-serif;font-size:13px;font-weight:400;color:#262626;background:#f0eeeb;border:1px solid #e5e3e0;padding:9px 11px;width:100%;outline:none;transition:border-color .15s,background .15s;-webkit-appearance:none;appearance:none;border-radius:0;}
    input:focus,select:focus,textarea:focus{border-color:#818181;background:#fff;}
    textarea{resize:vertical;min-height:76px;line-height:1.6;}
    .pfx{display:flex;}.pfx-tag{background:#e5e3e0;border:1px solid #e5e3e0;border-right:none;padding:9px 10px;font-size:10px;color:#818181;display:flex;align-items:center;white-space:nowrap;font-family:'Poppins',sans-serif;flex-shrink:0;}.pfx input{border-left:none;}
    .sfx{display:flex;}.sfx input{border-right:none;}.sfx-tag{background:#e5e3e0;border:1px solid #e5e3e0;border-left:none;padding:9px 10px;font-size:10px;color:#818181;display:flex;align-items:center;font-family:'Poppins',sans-serif;}
    .hint{font-size:9px;color:#b1ada2;font-style:italic;margin-top:2px;}

    /* AUTOCOMPLETE */
    .autocomplete-wrap{position:relative;}
    .autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e5e3e0;border-top:none;z-index:300;max-height:200px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.1);}
    .autocomplete-item{padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #f0eeeb;transition:background .1s;}
    .autocomplete-item:last-child{border-bottom:none;}
    .autocomplete-item:hover,.autocomplete-item.selected{background:#f0eeeb;}
    .autocomplete-item-sub{font-size:10px;color:#818181;margin-top:1px;}

    /* BUTTONS */
    .btn-dark{background:#262626;color:#e5e3e0;border:none;padding:9px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:9px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s;}
    .btn-dark:hover{background:#1a1a1a;}
    .btn-dark:disabled{background:#b1ada2;cursor:not-allowed;}
    .btn-warm{background:#b1ada2;color:#fff;border:none;padding:9px 18px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:9px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s;}
    .btn-warm:hover{opacity:.85;}
    .btn-ghost{background:transparent;color:#818181;border:1px solid #e5e3e0;padding:8px 14px;font-family:'Poppins',sans-serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:border-color .15s;}
    .btn-ghost:hover{border-color:#818181;color:#262626;}
    .btn-danger{background:#e74c3c22;color:#e74c3c;border:1px solid #e74c3c44;padding:7px 13px;font-family:'Poppins',sans-serif;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
    .btn-danger:hover{background:#e74c3c;color:#fff;}
    .btn-sm{padding:5px 10px!important;font-size:8px!important;}

    /* MODAL */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
    .modal{background:#fff;width:100%;max-width:760px;max-height:94vh;overflow-y:auto;}
    .modal-hdr{background:#262626;padding:16px 24px;display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;z-index:10;}
    .modal-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:13px;color:#e5e3e0;letter-spacing:2px;text-transform:uppercase;}
    .modal-sub{font-size:10px;color:#818181;margin-top:2px;}
    .modal-close{background:none;border:none;color:#818181;font-size:18px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0;}
    .modal-close:hover{color:#e5e3e0;}
    .modal-tabs{background:#1e1e1e;display:flex;border-bottom:1px solid #2a2a2a;overflow-x:auto;}
    .modal-tab{padding:8px 16px;font-size:8px;letter-spacing:2px;text-transform:uppercase;font-family:'Poppins',sans-serif;cursor:pointer;color:#818181;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
    .modal-tab.active{color:#e5e3e0;border-bottom-color:#b1ada2;}
    .modal-body{padding:22px;}
    .modal-footer{padding:12px 22px;border-top:1px solid #e5e3e0;display:flex;gap:8px;justify-content:flex-end;background:#f0eeeb;}

    /* RESULTS */

/* ─── FIREBASE HOOK ─── */
function useCollection(colName) {
  const[data,setData]=useState([]);
  const[fbMode,setFbMode]=useState(false);
  const fb=window.__fb;

  useEffect(()=>{
    if(!fb?.db)return;
    try{
      const{collection,query,orderBy,onSnapshot}=fb;
      const q=query(collection(fb.db,colName),orderBy("updatedAt","desc"));
      const unsub=onSnapshot(q,snap=>{
        setData(snap.docs.map(d=>({id:d.id,...d.data(),
          createdAt:d.data().createdAt?.toDate?.()??new Date(),
          updatedAt:d.data().updatedAt?.toDate?.()??new Date()
        })));
        setFbMode(true);
      },()=>{});
      return unsub;
    }catch(e){}
  },[colName]);

  const add=async(doc)=>{
    if(fb?.db){const{collection,addDoc,serverTimestamp}=fb;return await addDoc(collection(fb.db,colName),{...doc,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});}
    else{const id="local_"+Date.now();setData(p=>[{id,...doc,createdAt:new Date(),updatedAt:new Date()},...p]);return{id};}
  };
  const update=async(id,doc)=>{
    if(fb?.db){const{doc:d,updateDoc,serverTimestamp}=fb;await updateDoc(d(fb.db,colName,id),{...doc,updatedAt:serverTimestamp()});}
    else setData(p=>p.map(x=>x.id===id?{...x,...doc,updatedAt:new Date()}:x));
  };
  const remove=async(id)=>{
    if(fb?.db){const{doc:d,deleteDoc}=fb;await deleteDoc(d(fb.db,colName,id));}
    else setData(p=>p.filter(x=>x.id!==id));
  };
  return{data,fbMode,add,update,remove};
}

    await fb.signInWithEmailAndPassword(fb.auth,email,pass);

/* ─── STAGE TRACKER ─── */
function StageTracker({currentStage,onStageClick}){
  const idx=STAGES.findIndex(s=>s.id===currentStage);
  const isLost=currentStage==="no_aceptado";
  return(
    <div className="stage-track">
      {STAGES.map((s,i)=>{
        const done=!isLost&&i<idx,curr=!isLost&&s.id===currentStage;
        const cls=done?"done":curr?"current":"";
        return(
          <div key={s.id} className={`stage-item ${cls}`} onClick={()=>onStageClick&&onStageClick(s.id)}>
            <div className={`stage-dot ${cls}`}>{done?"✓":i+1}</div>
            <div className="stage-lbl">{s.label}</div>
          </div>
        );
      })}
    </div>
  );
}

/* ─── AUTOCOMPLETE ─── */
function Autocomplete({items,value,onSelect,placeholder,renderItem,getKey,getLabel,getSubLabel}){
  const[q,setQ]=useState(value||"");
  const[open,setOpen]=useState(false);
  useEffect(()=>{setQ(value||"");},[value]);
  const filtered=useMemo(()=>{
    if(!q.trim())return items.slice(0,10);
    const l=q.toLowerCase();
    return items.filter(it=>getLabel(it)?.toLowerCase().includes(l)||(getSubLabel&&getSubLabel(it)?.toLowerCase().includes(l))).slice(0,10);
  },[q,items]);
  return(
    <div className="autocomplete-wrap">
      <input value={q} placeholder={placeholder}
        onChange={e=>{setQ(e.target.value);setOpen(true);if(!e.target.value)onSelect(null);}}
        onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),160)}/>
      {open&&filtered.length>0&&(
        <div className="autocomplete-list">
          {filtered.map(it=>(
            <div key={getKey(it)} className="autocomplete-item" onMouseDown={()=>{onSelect(it);setQ(getLabel(it));setOpen(false);}}>
              <div style={{fontWeight:500}}>{getLabel(it)}</div>
              {getSubLabel&&<div className="autocomplete-item-sub">{getSubLabel(it)}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

    clienteNombre:initialData.clienteNombre||"",
    feriaId:initialData.feriaId||"",
    feria:initialData.feria||"",
    destino:initialData.destino||"",
    llegada:initialData.llegada||"",
    partida:initialData.partida||"",
    etapa:initialData.etapa||"exploracion",
    moneda:initialData.moneda||"USD",
    m2:initialData.m2||"",
    notas:initialData.notas||"",
    alertaFecha:initialData.alertaFecha||"",
    alertaTexto:initialData.alertaTexto||"",
    personas:String(initialData.personas||2),
  });
  const[saving,setSaving]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const selectCliente=(c)=>{if(!c){set("clienteId","");set("clienteNombre","");return;}set("clienteId",c.id);set("clienteNombre",c.empresa);if(!form.proyecto)set("proyecto",c.empresa);};
  const selectFeria=(f)=>{if(!f){set("feriaId","");set("feria","");set("destino","");return;}set("feriaId",f.id);set("feria",f.nombre);if(f.ciudad)set("destino",f.ciudad);if(f.fechaInicio)set("llegada",f.fechaInicio);if(f.fechaFin)set("partida",f.fechaFin);};
  const selectProyecto=(p)=>{if(!p){return;}set("proyecto",p.proyecto);set("clienteId",p.clienteId||"");set("clienteNombre",p.clienteNombre||"");set("feriaId",p.feriaId||"");set("feria",p.feria||"");};

  const save=async()=>{
    setSaving(true);
    await onSave({...form,personas:parseInt(form.personas)||2,m2:parseFloat(form.m2)||0});
    setSaving(false);
    onClose();
  };

  return(
    <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:640}}>
        <div className="modal-hdr">
          <div>
            <div className="modal-title">{title}</div>
            {form.codigo&&<div className="modal-sub"><span className="code-chip project">{form.codigo}</span></div>}
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="g2" style={{marginBottom:14}}>
            <div className="fg">
              <label>Cliente</label>
              <Autocomplete items={clients} value={form.clienteNombre} onSelect={selectCliente}
                placeholder="Buscar cliente..." getKey={c=>c.id} getLabel={c=>c.empresa}
                getSubLabel={c=>`${c.contacto||""}${c.pais?" · "+c.pais:""}`}/>
            </div>
            <div className="fg"><label>Nombre del Proyecto</label><input value={form.proyecto} onChange={e=>set("proyecto",e.target.value)} placeholder="ej. BILBOSA — Seafood 2026"/></div>
            <div className="fg">
              <label>Feria</label>
              <Autocomplete items={ferias} value={form.feria} onSelect={selectFeria}
                placeholder="Buscar feria..." getKey={f=>f.id} getLabel={f=>f.nombre}
                getSubLabel={f=>`${f.ciudad||""}${f.pais?", "+f.pais:""}${f.fechaInicio?" · "+fmtDate(f.fechaInicio):""}`}/>
            </div>
            <div className="fg"><label>Destino</label><input value={form.destino} onChange={e=>set("destino",e.target.value)} placeholder="Ciudad"/></div>
            <div className="fg"><label>Llegada</label><input type="date" value={form.llegada} onChange={e=>set("llegada",e.target.value)}/></div>
            <div className="fg"><label>Partida</label><input type="date" value={form.partida} onChange={e=>set("partida",e.target.value)}/></div>
            <div className="fg">
              <label>Etapa Inicial</label>
              <select value={form.etapa} onChange={e=>set("etapa",e.target.value)}>
                {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                <option value="no_aceptado">No Aceptado</option>
              </select>
            </div>
            <div className="fg">
              <label>Moneda</label>
              <select value={form.moneda} onChange={e=>set("moneda",e.target.value)}>
                <option value="USD">USD</option><option value="EUR">EUR</option><option value="UYU">UYU</option>
              </select>
            </div>
            <div className="fg"><label>Personas</label>
              <select value={form.personas} onChange={e=>set("personas",e.target.value)}>
                {[1,2,3,4,5,6].map(x=><option key={x} value={x}>{x} pax</option>)}
              </select>
            </div>
            <div className="fg"><label>Superficie (m²)</label>
              <div className="sfx"><input type="number" value={form.m2} onChange={e=>set("m2",e.target.value)} placeholder="0"/><span className="sfx-tag">m²</span></div>
            </div>
          </div>
          <div className="fg" style={{marginBottom:14}}>
            <label>Packlist / Observaciones del Stand</label>
            <textarea value={form.notas} onChange={e=>set("notas",e.target.value)} rows={3} placeholder="Sillas, barras, mesas, pantallas..."/>
          </div>
          <div style={{background:"#fff9f0",border:"1px solid #f39c1244",padding:"14px 16px",borderLeft:"3px solid #f39c12"}}>
            <div style={{fontSize:"8px",letterSpacing:"2px",textTransform:"uppercase",color:"#f39c12",fontFamily:"'Plus Jakarta Sans',sans-serif",marginBottom:10}}>⏰ Alerta de Seguimiento</div>
            <div className="g2">
              <div className="fg"><label>Fecha de Alerta</label><input type="date" value={form.alertaFecha} onChange={e=>set("alertaFecha",e.target.value)}/></div>
              <div className="fg"><label>Recordatorio</label><input value={form.alertaTexto} onChange={e=>set("alertaTexto",e.target.value)} placeholder="ej. Llamar a María para confirmar stand"/></div>
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn-dark" onClick={save} disabled={saving||!form.proyecto}>{saving?"Guardando...":"Guardar Proyecto"}</button>
        </div>
      </div>
    </div>
  );
}

/* ─── BUDGET CALCULATOR ─── */
function BudgetCalc({onSave,initialData={},allProjects=[],clients=[],ferias=[],suppliers=[]}){
  const[form,setForm]=useState({
    proyectoId:initialData.proyectoId||"",
    proyecto:initialData.proyecto||"",
    clienteId:initialData.clienteId||"",
    clienteNombre:initialData.clienteNombre||"",
    feriaId:initialData.feriaId||"",
    feria:initialData.feria||"",
    destino:initialData.destino||"",
    llegada:initialData.llegada||"",
    partida:initialData.partida||"",
    personas:String(initialData.personas||2),
    m2:initialData.m2||"",
    costoStand:initialData.costoStand||"",
    costoCatering:initialData.costoCatering||"",
    costoServicios:initialData.costoServicios||"",
    proveedorId:initialData.proveedorId||"",
    proveedorNombre:initialData.proveedorNombre||"",
    moneda:initialData.moneda||"USD",
    gastosAdminPct:initialData.gastosAdminPct?String(initialData.gastosAdminPct*100):"5",
    resultadoEsperado:"",
    notas:initialData.notas||"",
    etapa:initialData.etapa||"exploracion",
    codigo:initialData.codigo||"",
  });
  const[travel,setTravel]=useState({
    flight:initialData.flightCostPax?String(initialData.flightCostPax):"",
    hotel:initialData.hotelCostNight?String(initialData.hotelCostNight):"",
    daily:initialData.dailyCostPax?String(initialData.dailyCostPax):"",
  });
  const[result,setResult]=useState(null);
  const resRef=useRef(null);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const n=nightsBetween(form.llegada,form.partida);
  const pax=parseInt(form.personas)||1;
  const m2=parseFloat(form.m2)||0;

  const sameFeraAcep=allProjects.filter(p=>p.feria===form.feria&&p.destino?.toLowerCase()===form.destino?.toLowerCase()&&ACCEPTED_STAGES.includes(p.etapa)&&p.proyectoId!==form.proyectoId);
  const divisor=ACCEPTED_STAGES.includes(form.etapa)?sameFeraAcep.length+1:1;

  const onDestinoChange=(v)=>{set("destino",v);};
  const onDestinoBlur=()=>{if(form.destino){const d=getDef(form.destino);setTravel({flight:String(d.f),hotel:String(d.h),daily:String(d.d)});}};

  const selectProject=(p)=>{
    if(!p){set("proyectoId","");set("proyecto","");return;}
    set("proyectoId",p.id);set("proyecto",p.proyecto);
    set("clienteId",p.clienteId||"");set("clienteNombre",p.clienteNombre||"");
    set("feriaId",p.feriaId||"");set("feria",p.feria||"");
    set("destino",p.destino||"");set("codigo",p.codigo||"");
    set("etapa",p.etapa||"exploracion");set("notas",p.notas||"");
    set("personas",String(p.personas||2));set("m2",p.m2||"");
    if(p.llegada)set("llegada",p.llegada);if(p.partida)set("partida",p.partida);
    if(p.destino){const d=getDef(p.destino);setTravel({flight:String(d.f),hotel:String(d.h),daily:String(d.d)});}
  };
  const selectFeria=(f)=>{if(!f){set("feriaId","");set("feria","");set("destino","");return;}set("feriaId",f.id);set("feria",f.nombre);if(f.ciudad){set("destino",f.ciudad);const d=getDef(f.ciudad);setTravel({flight:String(d.f),hotel:String(d.h),daily:String(d.d)});}if(f.fechaInicio)set("llegada",f.fechaInicio);if(f.fechaFin)set("partida",f.fechaFin);};
  const selectSupplier=(s)=>{if(!s){set("proveedorId","");set("proveedorNombre","");return;}set("proveedorId",s.id);set("proveedorNombre",s.empresa);};

  const calcular=()=>{
    const cs=parseFloat(form.costoStand)||0,cc=parseFloat(form.costoCatering)||0,cv=parseFloat(form.costoServicios)||0,top=cs+cc+cv;
    const ft=(parseFloat(travel.flight)||0)*pax/divisor,ht=(parseFloat(travel.hotel)||0)*n*rooms(pax)/divisor,dt=(parseFloat(travel.daily)||0)*n*pax/divisor,trep=ft+ht+dt;
    const pct=(parseFloat(form.gastosAdminPct)/100)||0.05,neto=parseFloat(form.resultadoEsperado)||0,costos=top+trep;
    const rb=neto/0.75,ingresos=costos+rb/(1-pct),ga=(ingresos-costos)*pct,rbc=ingresos-costos-ga,irae=rbc*0.25;
    const cvf=(parseFloat(travel.flight)||0)*pax+(parseFloat(travel.hotel)||0)*n*rooms(pax)+(parseFloat(travel.daily)||0)*n*pax;
    setResult({ingresos,costoStand:cs,costoCatering:cc,costoServicios:cv,totalOperativos:top,flightTotal:ft,hotelTotal:ht,dailyTotal:dt,totalRepresentacion:trep,flightCostPax:parseFloat(travel.flight)||0,hotelCostNight:parseFloat(travel.hotel)||0,dailyCostPax:parseFloat(travel.daily)||0,gastosAdminPct:pct,gastosAdmin:ga,rentaBruta:rbc,irae,neto:rbc-irae,moneda:form.moneda,personas:pax,nights:n,divisor,costoViajeFull:cvf,m2,costoM2:m2>0?cs/m2:0});
    setTimeout(()=>resRef.current?.scrollIntoView({behavior:"smooth"}),100);
  };
  const canCalc=form.costoStand&&form.resultadoEsperado&&travel.flight&&travel.hotel&&travel.daily&&n>0;

  const handleSave=()=>{
    if(!result||!onSave)return;
    onSave({...form,personas:pax,gastosAdminPct:result.gastosAdminPct,ingresos:result.ingresos,costoStand:result.costoStand,costoCatering:result.costoCatering,costoServicios:result.costoServicios,flightTotal:result.flightTotal,hotelTotal:result.hotelTotal,dailyTotal:result.dailyTotal,flightCostPax:result.flightCostPax,hotelCostNight:result.hotelCostNight,dailyCostPax:result.dailyCostPax,gastosAdmin:result.gastosAdmin,rentaBruta:result.rentaBruta,irae:result.irae,neto:result.neto,totalRepresentacion:result.totalRepresentacion,totalOperativos:result.totalOperativos,m2:result.m2,costoM2:result.costoM2});
  };

  return(
    <div>
      {/* 1 — Proyecto */}
      <div className="card">
        <div className="card-hdr"><div className="card-hdr-left"><span className="step">1</span><span className="card-title">Proyecto</span></div></div>
        <div className="card-body">
          <div className="g2" style={{marginBottom:12}}>
            <div className="fg">
              <label>Seleccionar Proyecto Existente</label>
              <Autocomplete items={allProjects} value={form.proyecto} onSelect={selectProject}
                placeholder="Buscar proyecto..." getKey={p=>p.id} getLabel={p=>p.proyecto}
                getSubLabel={p=>`${p.codigo||""} · ${p.feria||""} · ${STAGES.find(s=>s.id===p.etapa)?.label||p.etapa}`}/>
              <span className="hint">Al seleccionar, se autocompletan los datos del proyecto</span>
            </div>
            <div className="fg">
              <label>Proveedor (Stand/Montaje)</label>
              <Autocomplete items={suppliers} value={form.proveedorNombre} onSelect={selectSupplier}
                placeholder="Buscar proveedor..." getKey={s=>s.id} getLabel={s=>s.empresa}
                getSubLabel={s=>`${s.codigo||""} · ${s.contacto||""}`}/>
            </div>
            <div className="fg">
              <label>Feria</label>
              <Autocomplete items={ferias} value={form.feria} onSelect={selectFeria}
                placeholder="Buscar feria..." getKey={f=>f.id} getLabel={f=>f.nombre}
                getSubLabel={f=>`${f.ciudad||""}${f.pais?", "+f.pais:""}${f.fechaInicio?" · "+fmtDate(f.fechaInicio):""}`}/>
            </div>
            <div className="fg">
              <label>Moneda</label>
              <select value={form.moneda} onChange={e=>set("moneda",e.target.value)}>
                <option value="USD">USD</option><option value="EUR">EUR</option><option value="UYU">UYU</option>
              </select>
            </div>
            <div className="fg">
              <label>Etapa</label>
              <select value={form.etapa} onChange={e=>set("etapa",e.target.value)}>
                {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                <option value="no_aceptado">No Aceptado</option>
              </select>
            </div>
          </div>
          {sameFeraAcep.length>0&&ACCEPTED_STAGES.includes(form.etapa)&&(
            <div className="note-box savings">
              <strong>⚡ Licuación de Costos Activa</strong>
              {sameFeraAcep.length} proyecto{sameFeraAcep.length>1?"s aceptados":"aceptado"} más en {form.feria}: {sameFeraAcep.map(p=>p.proyecto).join(", ")}. Viaje ÷{divisor}.
            </div>
          )}
        </div>
      </div>

      {/* 2 — Costos */}
      <div className="card">
        <div className="card-hdr"><div className="card-hdr-left"><span className="step">2</span><span className="card-title">Costos Operativos</span></div></div>
        <div className="card-body">
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:12,marginBottom:10}}>
            <div className="fg"><label>Stand / Montaje{form.proveedorNombre?` — ${form.proveedorNombre}`:""}</label><div className="pfx"><span className="pfx-tag">{form.moneda}</span><input type="number" placeholder="0" value={form.costoStand} onChange={e=>set("costoStand",e.target.value)}/></div></div>
            <div className="fg"><label>m²</label><div className="sfx"><input type="number" placeholder="0" value={form.m2} onChange={e=>set("m2",e.target.value)}/><span className="sfx-tag">m²</span></div></div>
            <div className="fg"><label>Catering</label><div className="pfx"><span className="pfx-tag">{form.moneda}</span><input type="number" placeholder="0" value={form.costoCatering} onChange={e=>set("costoCatering",e.target.value)}/></div></div>
            <div className="fg"><label>Servicios</label><div className="pfx"><span className="pfx-tag">{form.moneda}</span><input type="number" placeholder="0" value={form.costoServicios} onChange={e=>set("costoServicios",e.target.value)}/></div></div>
          </div>
          {form.costoStand&&m2>0&&<div className="note-box"><strong>Costo/m²</strong>Stand: {fc(form.moneda,(parseFloat(form.costoStand)||0)/m2)}/m²</div>}
        </div>
      </div>

      {/* 3 — Representación */}
      <div className="card">
        <div className="card-hdr">
          <div className="card-hdr-left"><span className="step">3</span><span className="card-title">Representación</span></div>
          {divisor>1&&<span className="saving-badge">÷{divisor} proyectos aceptados</span>}
          {!ACCEPTED_STAGES.includes(form.etapa)&&<span style={{fontSize:8,color:"#b1ada2",fontStyle:"italic"}}>Se prorrateará al aceptar</span>}
        </div>
        <div className="card-body">
          <div className="g4">
            <div className="fg"><label>Ciudad</label><input value={form.destino} onChange={e=>onDestinoChange(e.target.value)} onBlur={onDestinoBlur} placeholder="ej. Cologne"/></div>
            <div className="fg"><label>Personas</label><select value={form.personas} onChange={e=>set("personas",e.target.value)}>{[1,2,3,4,5,6].map(x=><option key={x} value={x}>{x} pax</option>)}</select></div>
            <div className="fg"><label>Llegada</label><input type="date" value={form.llegada} onChange={e=>set("llegada",e.target.value)}/></div>
            <div className="fg"><label>Partida</label><input type="date" value={form.partida} onChange={e=>set("partida",e.target.value)}/></div>
          </div>
          {n>0&&<p style={{fontSize:10,color:"#818181",fontStyle:"italic",marginTop:8}}><strong style={{fontStyle:"normal"}}>{n} noches · {pax} persona{pax>1?"s":""}</strong>{divisor>1&&<span style={{color:"#f39c12"}}> · Viaje ÷{divisor}</span>}</p>}
          <div className="tbadges">
            {[{k:"flight",lbl:"Pasaje/pax I+V",sub:"ida y vuelta"},{k:"hotel",lbl:"Hotel/noche/hab",sub:`${rooms(pax)} hab.`},{k:"daily",lbl:"Viáticos/día/pax",sub:"comida+transporte"}].map(({k,lbl,sub})=>(
              <div className="tbadge" key={k}>
                <div className="tb-lbl">{lbl}</div>
                <div className="pfx" style={{marginTop:4}}><span className="pfx-tag">{form.moneda}</span><input type="number" value={travel[k]} onChange={e=>setTravel(t=>({...t,[k]:e.target.value}))}/></div>
                <div className="tb-sub">{sub}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* 4 — Financiero */}
      <div className="card">
        <div className="card-hdr"><div className="card-hdr-left"><span className="step">4</span><span className="card-title">Parámetros Financieros</span></div></div>
        <div className="card-body">
          <div className="g2">
            <div className="fg"><label>Gastos Admin %</label><div className="sfx"><input type="number" step="0.5" min="0" max="100" value={form.gastosAdminPct} onChange={e=>set("gastosAdminPct",e.target.value)}/><span className="sfx-tag">%</span></div><p className="hint">Pre-cargado 5% — política Galerie</p></div>
            <div className="fg"><label>Resultado esperado neto ({form.moneda})</label><div className="pfx"><span className="pfx-tag">{form.moneda}</span><input type="number" placeholder="ej. 1500" value={form.resultadoEsperado} onChange={e=>set("resultadoEsperado",e.target.value)}/></div><p className="hint">IRAE Uruguay 25% sobre renta bruta</p></div>
          </div>
        </div>
      </div>

      <div style={{display:"flex",justifyContent:"center",marginTop:8}}>
        <button className="btn-dark" style={{padding:"13px 40px",fontSize:10,letterSpacing:4}} onClick={calcular} disabled={!canCalc}>
          {canCalc?"◆  CALCULAR PRESUPUESTO":"COMPLETÁ TODOS LOS CAMPOS"}
        </button>
      </div>

      {result&&(
        <div ref={resRef}>
          <div className="div-label"><span>Resultado</span></div>
          <div className="results">
            <div className="res-top">
              <div className="res-ey">Presupuesto calculado</div>
              <div className="res-title">{form.feria||"Feria Internacional"}{form.destino?` — ${form.destino}`:""}</div>
              <div className="res-sub">{form.proyecto}{form.clienteNombre?` · ${form.clienteNombre}`:""}{result.divisor>1?` · ⚡ Viaje ÷${result.divisor}`:""}</div>
            </div>
            <div className="res-body">
              <div className="res-sect"><span>Costos Operativos</span><span>{fc(result.moneda,result.totalOperativos)}</span></div>
              {result.costoStand>0&&<div className="res-row ind"><span>Stand{result.m2>0?` (${result.m2}m² · ${fc(result.moneda,result.costoM2)}/m²)`:""}</span><span className="res-amt">{fc(result.moneda,result.costoStand)}</span></div>}
              {result.costoCatering>0&&<div className="res-row ind"><span>Catering</span><span className="res-amt">{fc(result.moneda,result.costoCatering)}</span></div>}
              {result.costoServicios>0&&<div className="res-row ind"><span>Servicios</span><span className="res-amt">{fc(result.moneda,result.costoServicios)}</span></div>}
              <div className="res-sect"><span>Representación{result.divisor>1?` (1/${result.divisor})`:""}</span><span>{fc(result.moneda,result.totalRepresentacion)}</span></div>
              <div className="res-row ind"><span>Pasajes ({result.personas} pax)</span><span className="res-amt">{fc(result.moneda,result.flightTotal)}</span></div>
              <div className="res-row ind"><span>Hotel ({result.nights}n × {rooms(result.personas)}hab.)</span><span className="res-amt">{fc(result.moneda,result.hotelTotal)}</span></div>
              <div className="res-row ind"><span>Viáticos</span><span className="res-amt">{fc(result.moneda,result.dailyTotal)}</span></div>
              {result.divisor>1&&<div className="res-row ind" style={{color:"#f39c12"}}><span>Ahorro vs. sin compartir</span><span className="res-amt gold">−{fc(result.moneda,result.costoViajeFull-result.totalRepresentacion)}</span></div>}
              <div className="res-sect"><span>Admin ({(result.gastosAdminPct*100).toFixed(0)}%)</span><span>{fc(result.moneda,result.gastosAdmin)}</span></div>
              <div className="res-sect"><span>Renta Bruta antes IRAE</span><span>{fc(result.moneda,result.rentaBruta)}</span></div>
              <div className="res-row ind"><span>IRAE (25%)</span><span className="res-amt neg">({fc(result.moneda,result.irae)})</span></div>
              <div className="res-neto"><span>Resultado Neto</span><span className="res-amt pos">{fc(result.moneda,result.neto)}</span></div>
            </div>
            <div className="big-box">
              <div className="big-lbl">Ingreso Operativo a Cotizar</div>
              <div className="big-val">{fc(result.moneda,result.ingresos)}</div>
              <div className="big-sub">Mínimo a cobrar{result.m2>0?` · ${fc(result.moneda,result.ingresos/result.m2)}/m²`:""}</div>
            </div>
            <div className="res-tags">
              {form.destino&&<span className="tag">{form.destino}</span>}
              <span className="tag">{result.nights}n</span><span className="tag">{result.personas}pax</span>
              {result.m2>0&&<span className="tag">{result.m2}m²</span>}
              <span className="tag">IRAE 25%</span><span className="tag">Admin {(result.gastosAdminPct*100).toFixed(0)}%</span>
              <span className="tag">{result.moneda}</span>
              {result.divisor>1&&<span className="tag" style={{borderColor:"#f39c1244",color:"#f39c12"}}>÷{result.divisor}</span>}
            </div>
            <div className="res-actions">
              {onSave&&<button className="btn-dark" onClick={handleSave}>◆ GUARDAR EN PROYECTO</button>}
              <button className="btn-ghost-inv" onClick={()=>{setResult(null);window.scrollTo({top:0,behavior:"smooth"});}}>Nuevo cálculo</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── PROJECT MODAL (view/edit) ─── */
function ProjectModal({project,onClose,onUpdate,onDelete,allProjects,clients,ferias,suppliers}){
  const[mode,setMode]=useState("view");
  const[saving,setSaving]=useState(false);
  const[confirm,setConfirm]=useState(false);
  const[newStage,setNewStage]=useState(project.etapa);
  const[notas,setNotas]=useState(project.notas||"");
  const[alertaFecha,setAlertaFecha]=useState(project.alertaFecha||"");
  const[alertaTexto,setAlertaTexto]=useState(project.alertaTexto||"");
  const[qResult,setQResult]=useState(null);
  const[qForm,setQForm]=useState({
    proyecto:project.proyecto||"",clienteId:project.clienteId||"",clienteNombre:project.clienteNombre||"",
    feriaId:project.feriaId||"",feria:project.feria||"",destino:project.destino||"",
    llegada:project.llegada||"",partida:project.partida||"",personas:String(project.personas||2),
    m2:String(project.m2||""),costoStand:String(project.costoStand||""),costoCatering:String(project.costoCatering||""),
    costoServicios:String(project.costoServicios||""),moneda:project.moneda||"USD",
    gastosAdminPct:String((project.gastosAdminPct||0.05)*100),proveedorId:project.proveedorId||"",
    proveedorNombre:project.proveedorNombre||"",
  });
  const[qTravel,setQTravel]=useState({
    flight:String(project.flightCostPax||Math.round((project.flightTotal||0)/(project.personas||2))||""),
    hotel:String(project.hotelCostNight||""),daily:String(project.dailyCostPax||""),
  });
  const[resultadoEsp,setResultadoEsp]=useState(String(project.neto||""));
  const setQ=(k,v)=>setQForm(f=>({...f,[k]:v}));
  const qN=nightsBetween(qForm.llegada,qForm.partida);
  const qPax=parseInt(qForm.personas)||1;
  const sameFeraCount=allProjects.filter(p=>p.feria===project.feria&&p.id!==project.id&&ACCEPTED_STAGES.includes(p.etapa)).length;
  const divisor=ACCEPTED_STAGES.includes(project.etapa)?sameFeraCount+1:1;
  const cur=project.moneda;

  const saveStage=async()=>{setSaving(true);await onUpdate(project.id,{etapa:newStage,notas,alertaFecha,alertaTexto});setSaving(false);setMode("view");};
  const recalcular=()=>{
    const cs=parseFloat(qForm.costoStand)||0,cc=parseFloat(qForm.costoCatering)||0,cv=parseFloat(qForm.costoServicios)||0,top=cs+cc+cv;
    const qDiv=ACCEPTED_STAGES.includes(project.etapa)?sameFeraCount+1:1;
    const ft=(parseFloat(qTravel.flight)||0)*qPax/qDiv,ht=(parseFloat(qTravel.hotel)||0)*qN*rooms(qPax)/qDiv,dt=(parseFloat(qTravel.daily)||0)*qN*qPax/qDiv,trep=ft+ht+dt;
    const pct=(parseFloat(qForm.gastosAdminPct)/100)||0.05,neto=parseFloat(resultadoEsp)||0,costos=top+trep;
    const rb=neto/0.75,ingresos=costos+rb/(1-pct),ga=(ingresos-costos)*pct,rbc=ingresos-costos-ga,irae=rbc*0.25;
    const m2=parseFloat(qForm.m2)||0;
    setQResult({ingresos,costoStand:cs,costoCatering:cc,costoServicios:cv,totalOperativos:top,flightTotal:ft,hotelTotal:ht,dailyTotal:dt,totalRepresentacion:trep,flightCostPax:parseFloat(qTravel.flight)||0,hotelCostNight:parseFloat(qTravel.hotel)||0,dailyCostPax:parseFloat(qTravel.daily)||0,gastosAdminPct:pct,gastosAdmin:ga,rentaBruta:rbc,irae,neto:rbc-irae,moneda:qForm.moneda,m2,costoM2:m2>0?cs/m2:0});
  };
  const saveQuote=async()=>{if(!qResult)return;setSaving(true);await onUpdate(project.id,{...qForm,personas:qPax,gastosAdminPct:qResult.gastosAdminPct,...qResult,notas,alertaFecha,alertaTexto});setSaving(false);setMode("view");};

  const today=todayStr();
  const isOverdue=project.alertaFecha&&project.alertaFecha<=today;
  const isUpcoming=project.alertaFecha&&project.alertaFecha>today;

  return(
    <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:820}}>
        <div className="modal-hdr">
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              {project.codigo&&<span className="code-chip project">{project.codigo}</span>}
              <div className="modal-title">{project.proyecto}</div>
            </div>
            <div className="modal-sub">{project.feria}{project.destino?` · ${project.destino}`:""}{project.clienteNombre?` · ${project.clienteNombre}`:""}</div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-tabs">
          {[{id:"view",l:"Resumen"},{id:"edit-stage",l:"Etapa / Alerta"},{id:"edit-quote",l:"Cotización"}].map(t=>(
            <div key={t.id} className={`modal-tab${mode===t.id?" active":""}`} onClick={()=>setMode(t.id)}>{t.l}</div>
          ))}
        </div>
        <div className="modal-body">

          {/* VIEW */}
          {mode==="view"&&(
            <>
              {(isOverdue||isUpcoming)&&(
                <div className={`note-box ${isOverdue?"alert":"savings"}`} style={{marginBottom:14}}>
                  <strong>{isOverdue?"⚠️ Alerta vencida":"⏰ Recordatorio pendiente"} — {fmtDate(project.alertaFecha)}</strong>
                  {project.alertaTexto||"Sin descripción"}
                </div>
              )}
              <div style={{marginBottom:18}}>
                <div style={{fontSize:"8px",letterSpacing:"2px",color:"#818181",textTransform:"uppercase",marginBottom:8,fontFamily:"'Poppins',sans-serif"}}>Etapa</div>
                <StageTracker currentStage={project.etapa}/>
              </div>
              <div className="g2" style={{marginBottom:16}}>
                <div>
                  <div style={{fontSize:"8px",letterSpacing:"2px",color:"#818181",textTransform:"uppercase",marginBottom:3}}>Stand / Detalles</div>
                  <div style={{fontWeight:600,fontSize:13}}>{project.clienteNombre||"—"}</div>
                  <div style={{fontSize:"11px",color:"#818181"}}>{fmtDate(project.llegada)} → {fmtDate(project.partida)} · {project.personas||2}pax{project.m2?` · ${project.m2}m²`:""}</div>
                  {project.m2>0&&project.costoStand>0&&<div style={{fontSize:"10px",color:"#b1ada2",marginTop:1}}>{fc(cur,project.costoStand/project.m2)}/m² de stand</div>}
                  {project.proveedorNombre&&<div style={{fontSize:"10px",color:"#9b59b6",marginTop:2}}>Proveedor: {project.proveedorNombre}</div>}
                </div>
                <div>
                  <div style={{fontSize:"8px",letterSpacing:"2px",color:"#818181",textTransform:"uppercase",marginBottom:3}}>Packlist / Observaciones</div>
                  {project.notas?<div className="packlist-wrap"><div className="packlist-text">{project.notas}</div></div>:<div style={{fontSize:"11px",color:"#b1ada2",fontStyle:"italic"}}>Sin packlist</div>}
                </div>
              </div>
              {project.ingresos>0&&(
                <div className="results">
                  <div className="res-body" style={{paddingTop:12}}>

                    <div className="res-sect"><span>Representación{divisor>1?` (÷${divisor})`:""}</span><span>{fc(cur,project.totalRepresentacion)}</span></div>
                    <div className="res-sect"><span>Admin + IRAE</span><span>{fc(cur,(project.gastosAdmin||0)+(project.irae||0))}</span></div>
                    <div className="res-neto"><span>Resultado Neto</span><span className="res-amt pos">{fc(cur,project.neto)}</span></div>
                  </div>
                  <div className="big-box" style={{margin:"0 20px 14px"}}>
                    <div className="big-lbl">Ingreso a Cotizar</div>

                    {project.m2>0&&project.ingresos>0&&<div className="big-sub">{fc(cur,project.ingresos/project.m2)}/m²</div>}
                  </div>
                </div>
              )}
            </>
          )}

          {/* EDIT STAGE */}
          {mode==="edit-stage"&&(
            <>
              <div style={{fontSize:"8px",letterSpacing:"2px",color:"#818181",textTransform:"uppercase",marginBottom:8}}>Hacé click en la etapa para cambiarla</div>

                <div className="fg" style={{marginBottom:12}}>
                  <label>Etapa</label>
                  <select value={newStage} onChange={e=>setNewStage(e.target.value)}>
                    {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                    <option value="no_aceptado">No Aceptado</option>
                  </select>
                </div>
                {ACCEPTED_STAGES.includes(newStage)&&!ACCEPTED_STAGES.includes(project.etapa)&&(
                  <div className="note-box savings" style={{marginBottom:12}}>
                    <strong>⚡ Al aceptar</strong>Los costos de viaje se prorratearán con otros proyectos aceptados en la misma feria.
                  </div>
                )}
                <div className="fg" style={{marginBottom:14}}>
                  <label>Packlist / Observaciones</label>
                  <textarea value={notas} onChange={e=>setNotas(e.target.value)} rows={4} placeholder="Sillas, barras, mesas, pantallas..."/>
                </div>
                <div style={{background:"#fff9f0",border:"1px solid #f39c1244",padding:"13px 15px",borderLeft:"3px solid #f39c12"}}>
                  <div style={{fontSize:"8px",letterSpacing:"2px",textTransform:"uppercase",color:"#f39c12",fontFamily:"'Plus Jakarta Sans',sans-serif",marginBottom:10}}>⏰ Alerta de Seguimiento</div>
                  <div className="g2">
                    <div className="fg"><label>Fecha de Alerta</label><input type="date" value={alertaFecha} onChange={e=>setAlertaFecha(e.target.value)}/></div>
                    <div className="fg"><label>Recordatorio</label><input value={alertaTexto} onChange={e=>setAlertaTexto(e.target.value)} placeholder="ej. Llamar a María en mayo"/></div>
                  </div>
                </div>
              </div>
            </>

          {/* EDIT QUOTE */}
          {mode==="edit-quote"&&(
            <>
              <div className="note-box" style={{marginBottom:14}}>Editá y recalculá para actualizar el presupuesto.</div>

                <div className="fg"><label>Feria</label><input value={qForm.feria} onChange={e=>setQ("feria",e.target.value)}/></div>
                <div className="fg"><label>Destino</label><input value={qForm.destino} onChange={e=>setQ("destino",e.target.value)} onBlur={()=>{if(qForm.destino){const d=getDef(qForm.destino);setQTravel({flight:String(d.f),hotel:String(d.h),daily:String(d.d)});}}}/></div>

                <div className="fg"><label>m²</label><div className="sfx"><input type="number" value={qForm.m2} onChange={e=>setQ("m2",e.target.value)}/><span className="sfx-tag">m²</span></div></div>

                <div className="fg"><label>Servicios</label><div className="pfx"><span className="pfx-tag">{qForm.moneda}</span><input type="number" value={qForm.costoServicios} onChange={e=>setQ("costoServicios",e.target.value)}/></div></div>

                <div className="fg"><label>Pasaje/pax I+V</label><div className="pfx"><span className="pfx-tag">{qForm.moneda}</span><input type="number" value={qTravel.flight} onChange={e=>setQTravel(t=>({...t,flight:e.target.value}))}/></div></div>
                <div className="fg"><label>Hotel/noche</label><div className="pfx"><span className="pfx-tag">{qForm.moneda}</span><input type="number" value={qTravel.hotel} onChange={e=>setQTravel(t=>({...t,hotel:e.target.value}))}/></div></div>
                <div className="fg"><label>Viáticos/día/pax</label><div className="pfx"><span className="pfx-tag">{qForm.moneda}</span><input type="number" value={qTravel.daily} onChange={e=>setQTravel(t=>({...t,daily:e.target.value}))}/></div></div>

                <label>Packlist / Observaciones</label>
                <textarea value={notas} onChange={e=>setNotas(e.target.value)} rows={3} placeholder="Sillas, barras, mesas..."/>
              </div>
              <div style={{display:"flex",justifyContent:"center",marginBottom:14}}>
                <button className="btn-dark" onClick={recalcular} disabled={!qForm.costoStand||!resultadoEsp||!qTravel.flight||qN<=0}>◆ RECALCULAR</button>
              </div>
              {qResult&&(
                <div className="results">
                  <div className="res-body" style={{paddingTop:12}}>
                    <div className="res-sect"><span>Operativos</span><span>{fc(qResult.moneda,qResult.totalOperativos)}</span></div>
                    <div className="res-sect"><span>Representación</span><span>{fc(qResult.moneda,qResult.totalRepresentacion)}</span></div>
                    <div className="res-neto"><span>Neto</span><span className="res-amt pos">{fc(qResult.moneda,qResult.neto)}</span></div>
                  </div>
                  <div className="big-box" style={{margin:"0 20px 12px"}}>
                    <div className="big-lbl">Nuevo Ingreso</div>
                    <div className="big-val" style={{fontSize:28}}>{fc(qResult.moneda,qResult.ingresos)}</div>
                    <div className="big-sub">Δ: {qResult.ingresos>project.ingresos?"+":""}{fc(qResult.moneda,qResult.ingresos-(project.ingresos||0))}{qResult.m2>0?` · ${fc(qResult.moneda,qResult.ingresos/qResult.m2)}/m²`:""}</div>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
        <div className="modal-footer">
          {!confirm?<button className="btn-danger" onClick={()=>setConfirm(true)}>Eliminar</button>:<button className="btn-danger" onClick={()=>{onDelete(project.id);onClose();}}>¿Confirmar?</button>}
          <button className="btn-ghost" onClick={onClose}>Cerrar</button>
          {mode==="edit-stage"&&<button className="btn-dark" onClick={saveStage} disabled={saving}>{saving?"...":"Guardar"}</button>}
          {mode==="edit-quote"&&qResult&&<button className="btn-dark" onClick={saveQuote} disabled={saving}>{saving?"...":"Guardar Cotización"}</button>}
        </div>
      </div>
    </div>
  );
}

/* ─── PROJECTS LIST ─── */
function ProjectsList({projects,onUpdate,onDelete,onAdd,clients,ferias,suppliers}){
  const[selected,setSelected]=useState(null);
  const[showNew,setShowNew]=useState(false);
  const[filter,setFilter]=useState("todos");
  const[search,setSearch]=useState("");

  const filtered=projects.filter(p=>{
    const mS=filter==="todos"||p.etapa===filter;
    const mQ=!search||p.proyecto?.toLowerCase().includes(search.toLowerCase())||p.feria?.toLowerCase().includes(search.toLowerCase())||p.codigo?.toLowerCase().includes(search.toLowerCase())||p.clienteNombre?.toLowerCase().includes(search.toLowerCase());
    return mS&&mQ;
  });

  return(
    <div className="page-wide">
      <div className="filter-bar">
        <input placeholder="Buscar código, proyecto, feria, cliente..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:200,maxWidth:340}}/>
        <select value={filter} onChange={e=>setFilter(e.target.value)} style={{width:"auto",minWidth:150}}>
          <option value="todos">Todas las etapas</option>
          {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
          <option value="no_aceptado">No Aceptado</option>
        </select>
        <button className="btn-dark" onClick={()=>setShowNew(true)}>+ Nuevo Proyecto</button>
      </div>

      {filtered.length===0
        ?<div className="empty"><div className="empty-icon">📁</div><div className="empty-title">Sin proyectos</div><div className="empty-sub">Ajustá el filtro o creá un nuevo proyecto</div></div>
        :(
          <div className="card"><div className="card-body" style={{padding:0}}>
            <table className="tbl">
              <thead><tr><th>Código</th><th>Proyecto</th><th>Cliente</th><th>Feria</th><th>m²</th><th>Etapa</th><th>Ingreso</th><th>€/m²</th><th>Neto</th><th>Alerta</th></tr></thead>
              <tbody>
                {filtered.map(p=>{
                  const isOv=p.alertaFecha&&p.alertaFecha<=todayStr();
                  const isUp=p.alertaFecha&&p.alertaFecha>todayStr();
                  return(
                    <tr key={p.id} style={{cursor:"pointer"}} onClick={()=>setSelected(p)}>
                      <td><span className="code-chip project">{p.codigo||"—"}</span></td>
                      <td><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:12}}>{p.proyecto}</div></td>
                      <td style={{fontSize:11,color:"#818181"}}>{p.clienteNombre||"—"}</td>
                      <td><div style={{fontWeight:500,fontSize:11}}>{p.feria}</div><div style={{fontSize:10,color:"#818181"}}>{p.destino}</div></td>
                      <td style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600,fontSize:12}}>{p.m2>0?`${p.m2}m²`:"—"}</td>
                      <td><span className={`badge ${STAGE_BADGE[p.etapa]||""}`}>{STAGES.find(s=>s.id===p.etapa)?.label||p.etapa}</span></td>
                      <td style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600,fontSize:12}}>{p.ingresos>0?fc(p.moneda,p.ingresos):"—"}</td>
                      <td style={{fontSize:10,color:"#b1ada2"}}>{p.m2>0&&p.ingresos>0?fc(p.moneda,p.ingresos/p.m2):"—"}</td>
                      <td style={{color:"#2ecc71",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600,fontSize:12}}>{p.neto>0?fc(p.moneda,p.neto):"—"}</td>
                      <td>{isOv&&<span style={{fontSize:9,color:"#e74c3c",fontWeight:600}}>⚠️ {fmtDate(p.alertaFecha)}</span>}{isUp&&<span style={{fontSize:9,color:"#f39c12"}}>⏰ {fmtDate(p.alertaFecha)}</span>}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div></div>
        )
      }

      {showNew&&(
        <ProjectFormModal
          title="Nuevo Proyecto"
          clients={clients} ferias={ferias} projects={projects}
          onClose={()=>setShowNew(false)}
          onSave={onAdd}
        />
      )}

      {selected&&(
        <ProjectModal
          project={selected}
          onClose={()=>setSelected(null)}
          onUpdate={async(id,data)=>{await onUpdate(id,data);setSelected(p=>({...p,...data}));}}
          onDelete={onDelete}
          allProjects={projects}
          clients={clients} ferias={ferias} suppliers={suppliers}
        />
      )}
    </div>
  );
}

/* ─── ENTITY SECTION (Clients / Suppliers) ─── */
function EntitySection({title,icon,collection,codePrefix,genCode,extraFields=[],nameField="empresa"}){
  const[modal,setModal]=useState(null);
  const[confirm,setConfirm]=useState(null);
  const[search,setSearch]=useState("");

  const baseFields={empresa:"",contacto:"",cargo:"",pais:"",telefono:"",mail:"",notas:"",alertaFecha:"",alertaTexto:""};
  const extraDefaults={};extraFields.forEach(f=>{extraDefaults[f.key]="";});
  const blankForm={...baseFields,...extraDefaults};
  const[form,setForm]=useState(blankForm);
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));

  const filtered=collection.data.filter(c=>!search||
    c[nameField]?.toLowerCase().includes(search.toLowerCase())||
    c.contacto?.toLowerCase().includes(search.toLowerCase())||
    c.mail?.toLowerCase().includes(search.toLowerCase())||
    c.pais?.toLowerCase().includes(search.toLowerCase())||
    c.codigo?.toLowerCase().includes(search.toLowerCase())
  );

  const openNew=()=>{setForm(blankForm);setModal({mode:"new"});};
  const openEdit=(c)=>{setForm({empresa:c.empresa||"",contacto:c.contacto||"",cargo:c.cargo||"",pais:c.pais||"",telefono:c.telefono||"",mail:c.mail||"",notas:c.notas||"",alertaFecha:c.alertaFecha||"",alertaTexto:c.alertaTexto||"",...Object.fromEntries(extraFields.map(f=>[f.key,c[f.key]||""]))});setModal({mode:"edit",id:c.id,codigo:c.codigo});};

  const save=async()=>{
    if(modal.mode==="new"){
      const seq=collection.data.length+1;
      const codigo=genCode(seq);
      await collection.add({...form,codigo});
    } else {
      await collection.update(modal.id,{...form});
    }
    setModal(null);
  };

        :(

              </tr></thead>
              <tbody>
                {filtered.map(c=>{
                  const isOv=c.alertaFecha&&c.alertaFecha<=today;

                  return(
                    <tr key={c.id}>
                      <td><span className={`code-chip ${codePrefix==="G"?"client":"supplier"}`}>{c.codigo||"—"}</span></td>
                      <td><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700}}>{c[nameField]}</div>{c.cargo&&<div style={{fontSize:10,color:"#818181"}}>{c.cargo}</div>}</td>
                      <td style={{fontSize:11}}>{c.contacto||"—"}</td>
                      <td style={{fontSize:11}}>{c.pais||"—"}</td>
                      <td style={{fontSize:11}}>{c.telefono||"—"}</td>
                      <td style={{fontSize:11}}>{c.mail||"—"}</td>
                      <td>{isOv&&<span style={{fontSize:9,color:"#e74c3c",fontWeight:600}}>⚠️ {fmtDate(c.alertaFecha)}</span>}{isUp&&<span style={{fontSize:9,color:"#f39c12"}}>⏰ {fmtDate(c.alertaFecha)}</span>}</td>
                      <td><div className="tbl-actions"><button className="btn-ghost btn-sm" onClick={()=>openEdit(c)}>Editar</button><button className="btn-danger btn-sm" onClick={()=>setConfirm(c.id)}>✕</button></div></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div></div>
        )
      }

      {modal&&(
        <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal" style={{maxWidth:580}}>
            <div className="modal-hdr">
              <div>
                <div className="modal-title">{modal.mode==="new"?`Nuevo ${title.slice(0,-1)}`:`Editar ${title.slice(0,-1)}`}</div>
                {modal.codigo&&<div className="modal-sub"><span className={`code-chip ${codePrefix==="G"?"client":"supplier"}`}>{modal.codigo}</span></div>}
              </div>
              <button className="modal-close" onClick={()=>setModal(null)}>✕</button>
            </div>
            <div className="modal-body">
              <div className="g2" style={{marginBottom:12}}>
                <div className="fg" style={{gridColumn:"1/-1"}}><label>Empresa / Razón Social</label><input value={form.empresa} onChange={e=>setF("empresa",e.target.value)} placeholder="ej. BILBOSA S.A."/></div>
                <div className="fg"><label>Contacto</label><input value={form.contacto} onChange={e=>setF("contacto",e.target.value)} placeholder="Nombre completo"/></div>
                <div className="fg"><label>Cargo</label><input value={form.cargo} onChange={e=>setF("cargo",e.target.value)} placeholder="ej. Gerente de Marketing"/></div>
                <div className="fg"><label>País</label><CountrySelect value={form.pais} onChange={v=>setF("pais",v)}/></div>
                <div className="fg"><label>Teléfono / WhatsApp</label><input value={form.telefono} onChange={e=>setF("telefono",e.target.value)} placeholder="+598 99 123 456"/></div>
                <div className="fg" style={{gridColumn:"1/-1"}}><label>Mail</label><input type="email" value={form.mail} onChange={e=>setF("mail",e.target.value)} placeholder="email@empresa.com"/></div>
                {extraFields.map(f=>(
                  <div key={f.key} className="fg" style={f.full?{gridColumn:"1/-1"}:{}}><label>{f.label}</label><input value={form[f.key]||""} onChange={e=>setF(f.key,e.target.value)} placeholder={f.placeholder||""}/></div>
                ))}
                <div className="fg" style={{gridColumn:"1/-1"}}><label>Notas</label><textarea value={form.notas} onChange={e=>setF("notas",e.target.value)} rows={2} placeholder="Observaciones generales..."/></div>
              </div>
              <div style={{background:"#fff9f0",border:"1px solid #f39c1244",padding:"13px 15px",borderLeft:"3px solid #f39c12"}}>
                <div style={{fontSize:"8px",letterSpacing:"2px",textTransform:"uppercase",color:"#f39c12",fontFamily:"'Plus Jakarta Sans',sans-serif",marginBottom:10}}>⏰ Alerta / Recordatorio de Contacto</div>
                <div className="g2">
                  <div className="fg"><label>Fecha</label><input type="date" value={form.alertaFecha} onChange={e=>setF("alertaFecha",e.target.value)}/></div>
                  <div className="fg"><label>Recordatorio</label><input value={form.alertaTexto} onChange={e=>setF("alertaTexto",e.target.value)} placeholder="ej. Contactar en mayo para Anuga 2026"/></div>
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn-ghost" onClick={()=>setModal(null)}>Cancelar</button>
              <button className="btn-dark" onClick={save} disabled={!form.empresa}>Guardar</button>

      )}

      {confirm&&(
        <div className="modal-backdrop" onClick={()=>setConfirm(null)}>
          <div className="modal" style={{maxWidth:360}} onClick={e=>e.stopPropagation()}>

            <div className="modal-body"><p style={{fontSize:13}}>¿Eliminás este registro?</p></div>
            <div className="modal-footer"><button className="btn-ghost" onClick={()=>setConfirm(null)}>Cancelar</button><button className="btn-danger" onClick={()=>del(confirm)}>Eliminar</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

function FeriasSection({ferias,projects}){
  const[modal,setModal]=useState(null);
  const[confirm,setConfirm]=useState(null);
  const[search,setSearch]=useState("");
  const blank={nombre:"",ciudad:"",pais:"",fechaInicio:"",fechaFin:"",notas:""};
  const[form,setForm]=useState(blank);
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
  const filtered=ferias.data.filter(f=>!search||f.nombre?.toLowerCase().includes(search.toLowerCase())||f.ciudad?.toLowerCase().includes(search.toLowerCase())||f.pais?.toLowerCase().includes(search.toLowerCase()));
  const openEdit=(f)=>{setForm({nombre:f.nombre||"",ciudad:f.ciudad||"",pais:f.pais||"",fechaInicio:f.fechaInicio||"",fechaFin:f.fechaFin||"",notas:f.notas||""});setModal({mode:"edit",id:f.id});};
  const save=async()=>{if(modal.mode==="new")await ferias.add({...form});else await ferias.update(modal.id,{...form});setModal(null);};
  const del=async(id)=>{await ferias.remove(id);setConfirm(null);};
  const pc=(id,nombre)=>projects.filter(p=>p.feriaId===id||p.feria===nombre).length;
  const rev=(id,nombre)=>projects.filter(p=>(p.feriaId===id||p.feria===nombre)&&!["no_aceptado"].includes(p.etapa)).reduce((a,p)=>a+(p.ingresos||0),0);
  return(
    <div className="page-wide">
      <div className="filter-bar">
        <input placeholder="Buscar feria o ciudad..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:200,maxWidth:360}}/>
        <button className="btn-dark" onClick={()=>{setForm(blank);setModal({mode:"new"});}}>+ Nueva Feria</button>
      </div>
      {filtered.length===0
        ?<div className="empty"><div className="empty-icon">🎪</div><div className="empty-title">Sin ferias</div><div className="empty-sub">Registrá tu primera feria</div></div>
        :(
          <div className="card"><div className="card-body" style={{padding:0}}>
            <table className="tbl">
              <thead><tr><th>Feria</th><th>Ciudad / País</th><th>Fechas</th><th>Proyectos</th><th>Revenue</th><th style={{width:90}}></th></tr></thead>
              <tbody>
                {filtered.map(f=>{const p=pc(f.id,f.nombre),r=rev(f.id,f.nombre);return(
                  <tr key={f.id}>
                    <td><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700}}>{f.nombre}</div>{f.notas&&<div style={{fontSize:10,color:"#818181"}}>{f.notas}</div>}</td>
                    <td><div style={{fontWeight:500}}>{f.ciudad||"—"}</div><div style={{fontSize:10,color:"#818181"}}>{f.pais||""}</div></td>
                    <td style={{fontSize:11}}>{fmtDate(f.fechaInicio)}<br/>{fmtDate(f.fechaFin)}</td>
                    <td><span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:15}}>{p}</span><span style={{fontSize:10,color:"#818181"}}> proy.</span></td>
                    <td style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600,color:r>0?"#2ecc71":"#818181"}}>{r>0?`USD ${fmt(r)}`:"—"}</td>
                    <td><div className="tbl-actions"><button className="btn-ghost btn-sm" onClick={()=>openEdit(f)}>Editar</button><button className="btn-danger btn-sm" onClick={()=>setConfirm(f.id)}>✕</button></div></td>
                  </tr>
                );})}
              </tbody>
            </table>
          </div></div>
        )
      }
      {modal&&(
        <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal" style={{maxWidth:520}}>
            <div className="modal-hdr"><div className="modal-title">{modal.mode==="new"?"Nueva Feria":"Editar Feria"}</div><button className="modal-close" onClick={()=>setModal(null)}>✕</button></div>
            <div className="modal-body">
              <div className="g2">
                <div className="fg" style={{gridColumn:"1/-1"}}><label>Nombre de la Feria</label><input value={form.nombre} onChange={e=>setF("nombre",e.target.value)} placeholder="ej. Anuga Cologne 2026"/></div>
                <div className="fg"><label>Ciudad</label><input value={form.ciudad} onChange={e=>setF("ciudad",e.target.value)} placeholder="ej. Cologne"/></div>
                <div className="fg"><label>País</label><CountrySelect value={form.pais} onChange={v=>setF("pais",v)}/></div>
                <div className="fg"><label>Fecha Inicio</label><input type="date" value={form.fechaInicio} onChange={e=>setF("fechaInicio",e.target.value)}/></div>
                <div className="fg"><label>Fecha Fin</label><input type="date" value={form.fechaFin} onChange={e=>setF("fechaFin",e.target.value)}/></div>
                <div className="fg" style={{gridColumn:"1/-1"}}><label>Notas</label><textarea value={form.notas} onChange={e=>setF("notas",e.target.value)} rows={2} placeholder="Sector, descripción..."/></div>
              </div>
            </div>
            <div className="modal-footer"><button className="btn-ghost" onClick={()=>setModal(null)}>Cancelar</button><button className="btn-dark" onClick={save} disabled={!form.nombre}>Guardar</button></div>
          </div>
        </div>
      )}
      {confirm&&(<div className="modal-backdrop" onClick={()=>setConfirm(null)}><div className="modal" style={{maxWidth:360}} onClick={e=>e.stopPropagation()}><div className="modal-hdr"><div className="modal-title">Confirmar eliminación</div></div><div className="modal-body"><p style={{fontSize:13}}>¿Eliminás esta feria?</p></div><div className="modal-footer"><button className="btn-ghost" onClick={()=>setConfirm(null)}>Cancelar</button><button className="btn-danger" onClick={()=>del(confirm)}>Eliminar</button></div></div></div>)}
    </div>
  );
