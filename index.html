/* ─── DASHBOARD ─── */
function Dashboard({projects,ferias,onTabChange,allAlertas}){
  const[filterFeria,setFilterFeria]=useState("todas");
  const[filterYear,setFilterYear]=useState("todos");

  const years=[...new Set(projects.map(p=>p.createdAt?new Date(p.createdAt).getFullYear():new Date().getFullYear()).filter(Boolean))].sort((a,b)=>b-a);
  const feriaNames=[...new Set(projects.map(p=>p.feria).filter(Boolean))].sort();

  const filtered=projects.filter(p=>{
    const fOk=filterFeria==="todas"||p.feria===filterFeria;
    const yr=p.createdAt?new Date(p.createdAt).getFullYear():new Date().getFullYear();
    const yOk=filterYear==="todos"||String(yr)===filterYear;
    return fOk&&yOk;
  });

  const active=filtered.filter(p=>!["completado","no_aceptado"].includes(p.etapa));
  const completed=filtered.filter(p=>p.etapa==="completado");
  const lost=filtered.filter(p=>p.etapa==="no_aceptado");
  const revenue=completed.reduce((a,p)=>a+(p.ingresos||0),0);
  const netProfit=completed.reduce((a,p)=>a+(p.neto||0),0);

  const stageCounts={};STAGES.forEach(s=>{stageCounts[s.id]=filtered.filter(p=>p.etapa===s.id).length;});

  const alertas = allAlertas || [];

  const byFeria={};
  filtered.forEach(p=>{if(!p.feria)return;if(!byFeria[p.feria])byFeria[p.feria]={ps:[],destino:p.destino};byFeria[p.feria].ps.push(p);});
  const feriaData=Object.entries(byFeria).map(([name,{ps,destino}])=>{
    const activos=ps.filter(p=>!["no_aceptado"].includes(p.etapa));
    const aceptados=ps.filter(p=>ACCEPTED_STAGES.includes(p.etapa));
    const totalIngresos=activos.reduce((a,p)=>a+(p.ingresos||0),0);
    const totalNeto=activos.reduce((a,p)=>a+(p.neto||0),0);
    return{name,destino,ps:activos,aceptados,totalIngresos,totalNeto};
  }).sort((a,b)=>b.totalIngresos-a.totalIngresos);

  return(
    <div className="page-wide">
      {/* Alerts banner */}
      {alertas.length>0&&(
        <div style={{marginBottom:16}}>
          {alertas.slice(0,3).map((a,i)=>{
            const tipoTab=a.tipo==="cliente"?"clientes":a.tipo==="proveedor"?"proveedores":"proyectos";
            const tipoLabel=a.tipo==="cliente"?"👤":a.tipo==="proveedor"?"🏭":"📁";
            return(
              <div key={a.id+i} className="alert-banner" onClick={()=>onTabChange(tipoTab)}>
                <div className="alert-icon">{a.overdue?"⚠️":"⏰"}</div>
                <div className="alert-text">
                  <strong>{a.overdue?"VENCIDA":"Recordatorio"} — {fmtDate(a.alertaFecha)}</strong>
                  {" "}{tipoLabel} {a.nombre}: {a.alertaTexto||"Sin descripción"}
                </div>
                <div className="alert-badge">{a.overdue?"VENCIDO":"PENDIENTE"}</div>
              </div>
            );
          })}
          {alertas.length>3&&<div style={{fontSize:10,color:"#818181",textAlign:"center",padding:"6px 0"}}>+{alertas.length-3} alertas más — usá la campana 🔔</div>}
        </div>
      )}

      {/* Filters */}
      <div className="filter-bar" style={{marginBottom:16}}>
        <select value={filterFeria} onChange={e=>setFilterFeria(e.target.value)} style={{minWidth:200}}>
          <option value="todas">Todas las ferias</option>
          {feriaNames.map(f=><option key={f} value={f}>{f}</option>)}
        </select>
        <select value={filterYear} onChange={e=>setFilterYear(e.target.value)} style={{minWidth:120}}>
          <option value="todos">Todos los años</option>
          {years.map(y=><option key={y} value={y}>{y}</option>)}
        </select>
        {(filterFeria!=="todas"||filterYear!=="todos")&&<button className="btn-ghost" onClick={()=>{setFilterFeria("todas");setFilterYear("todos");}}>✕ Limpiar</button>}
      </div>

      <div className="stats-grid">
        <div className="stat-card dark"><div className="stat-lbl">Activos</div><div className="stat-val">{active.length}</div><div className="stat-sub">{filtered.length} proyectos filtrados</div></div>
        <div className="stat-card green"><div className="stat-lbl">Completados</div><div className="stat-val">{completed.length}</div><div className="stat-sub">Éxito: {filtered.length?Math.round(completed.length/filtered.length*100):0}%</div></div>
        <div className="stat-card gold"><div className="stat-lbl">Revenue Completados</div><div className="stat-val" style={{fontSize:17}}>USD {fmt(revenue)}</div><div className="stat-sub">Neto: USD {fmt(netProfit)}</div></div>
        <div className="stat-card red"><div className="stat-lbl">No Aceptados</div><div className="stat-val">{lost.length}</div><div className="stat-sub">{filtered.length?Math.round(lost.length/filtered.length*100):0}% tasa</div></div>
      </div>

      <div style={{marginBottom:18}}>
        <div style={{fontSize:"8px",letterSpacing:"2.5px",textTransform:"uppercase",color:"#818181",marginBottom:8,fontFamily:"'Poppins',sans-serif"}}>Pipeline</div>
        <div className="pipeline">
          {STAGES.slice(0,7).map(s=>(
            <div key={s.id} className="pipe-stage">
              <div className="pipe-lbl">{s.label}</div>
              <div className="pipe-count">{stageCounts[s.id]||0}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{fontSize:"8px",letterSpacing:"2.5px",textTransform:"uppercase",color:"#818181",marginBottom:8,fontFamily:"'Poppins',sans-serif"}}>Por Feria</div>
      {feriaData.length===0&&<div className="empty"><div className="empty-icon">📊</div><div className="empty-title">Sin datos</div><div className="empty-sub">Creá proyectos para ver el análisis</div></div>}
      {feriaData.map(fd=>(
        <div key={fd.name} className="feria-card">
          <div className="feria-hdr">
            <div><div className="feria-name">{fd.name}</div><div className="feria-meta">{fd.destino} · {fd.ps.length} proy.{fd.aceptados.length>0?` · ${fd.aceptados.length} aceptados`:""}</div></div>
            <div className="feria-stats">
              <div className="feria-stat"><div className="feria-stat-lbl">Ingresos</div><div className="feria-stat-val">{fc(fd.ps[0]?.moneda||"USD",fd.totalIngresos)}</div></div>
              <div className="feria-stat"><div className="feria-stat-lbl">Neto</div><div className="feria-stat-val" style={{color:"#2ecc71"}}>{fc(fd.ps[0]?.moneda||"USD",fd.totalNeto)}</div></div>
            </div>
          </div>
          <div className="feria-body">
            <div className="clients-list">
              {fd.ps.map(p=>(
                <div key={p.id} className="client-row">
                  <div>
                    {p.codigo&&<span className="code-chip project" style={{marginBottom:3,display:"inline-block"}}>{p.codigo}</span>}
                    <div className="client-name-big">{p.proyecto}</div>
                    <div className="client-meta-sm">{p.clienteNombre||"—"}{p.m2?` · ${p.m2}m²`:""} · <span className={`badge ${STAGE_BADGE[p.etapa]||""}`}>{STAGES.find(s=>s.id===p.etapa)?.label||p.etapa}</span></div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:13}}>{p.ingresos>0?fc(p.moneda,p.ingresos):"Sin cotizar"}</div>
                    {p.m2>0&&p.ingresos>0&&<div style={{fontSize:10,color:"#b1ada2"}}>{fc(p.moneda,p.ingresos/p.m2)}/m²</div>}
                    {p.neto>0&&<div style={{fontSize:10,color:"#2ecc71"}}>Neto: {fc(p.moneda,p.neto)}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ─── MAIN APP ─── */
function App(){
  const{user,loading,login,logout}=useAuth();
  const projects=useCollection("projects");
  const clients=useCollection("clients");
  const ferias=useCollection("ferias");
  const suppliers=useCollection("suppliers");
  const[tab,setTab]=useState("dashboard");

  // Generate project code on add
  const handleAddProject=async(data)=>{
    const seq=projects.data.length+1;
    const codigo=genProjectCode(seq);
    await projects.add({...data,codigo});
  };
  const handleSaveFromCalc=async(data)=>{
    if(data.proyectoId){
      await projects.update(data.proyectoId,data);
    } else {
      await handleAddProject(data);
    }
    setTab("proyectos");
  };

  // ── ALERTS: projects + clients + suppliers ──
  // todayStr() returns YYYY-MM-DD which compares correctly with string comparison
  const today = todayStr();
  const week7 = new Date(Date.now()+7*86400000).toISOString().split("T")[0];

  const buildAlertas = (items, tipo) =>
    items
      .filter(x => x.alertaFecha && x.alertaFecha.trim() !== "")
      .map(x => ({
        id: x.id,
        nombre: x.proyecto || x.empresa || "Sin nombre",
        subtitulo: x.feria || x.cargo || "",
        alertaFecha: x.alertaFecha.trim(),
        alertaTexto: x.alertaTexto || "",
        tipo,
        overdue: x.alertaFecha.trim() <= today,
      }));

  const allAlertasFull = [
    ...buildAlertas(projects.data, "proyecto"),
    ...buildAlertas(clients.data,  "cliente"),
    ...buildAlertas(suppliers.data,"proveedor"),
  ].sort((a,b) => a.alertaFecha.localeCompare(b.alertaFecha));

  const alertCount    = allAlertasFull.filter(a => a.overdue).length;
  const upcomingCount = allAlertasFull.filter(a => !a.overdue && a.alertaFecha <= week7).length;
  const totalAlerts   = allAlertasFull.length; // badge shows ALL, not just 7-day window

  const[bellOpen,setBellOpen]=useState(false);
  const bellRef=useRef(null);
  useEffect(()=>{
    if(!bellOpen)return;
    const handler=(e)=>{if(bellRef.current&&!bellRef.current.contains(e.target))setBellOpen(false);};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[bellOpen]);

  if(loading)return(<div style={{minHeight:"100vh",background:"#262626",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:18,letterSpacing:6,color:"#e5e3e0"}}>GALERIE</div></div>);
  if(!user)return<LoginScreen onLogin={login}/>;

  const TABS=[
    {id:"dashboard",   label:"Dashboard",     dot:"#f39c12"},
    {id:"proyectos",   label:"Proyectos",      dot:"#3498db"},
    {id:"cotizacion",  label:"Cotización",     dot:"#2ecc71"},
    {id:"ferias",      label:"Ferias",         dot:"#9b59b6"},
    {id:"clientes",    label:"Clientes",       dot:"#e67e22"},
    {id:"proveedores", label:"Proveedores",    dot:"#e74c3c"},
  ];

  const activeCount=projects.data.filter(p=>!["completado","no_aceptado"].includes(p.etapa)).length;

  return(
    <>
      <div className="sticky-shell">
        <header className="hdr">
          <div className="hdr-logo" onClick={()=>setTab("dashboard")}>GALERIE</div>
          <div className="hdr-right">

            {/* BELL WITH DROPDOWN */}
            <div className="alert-bell-wrap" ref={bellRef}>
              <div
                className={`alert-bell${alertCount>0?" has-overdue":upcomingCount>0?" has-upcoming":""}`}
                onClick={()=>setBellOpen(o=>!o)}
                title={totalAlerts>0?`${alertCount} vencidas · ${upcomingCount} próximas`:"Sin alertas pendientes"}
              >
                <span className="alert-bell-icon">🔔</span>
                {totalAlerts>0&&<span className={`alert-bubble ${alertCount>0?"overdue":"upcoming"}`}>{totalAlerts}</span>}
              </div>

              {bellOpen&&(
                <div className="alert-panel">
                  <div className="alert-panel-hdr">
                    <div className="alert-panel-title">Alertas</div>
                    <div className="alert-panel-count">
                      {alertCount>0&&<span style={{color:"#e74c3c",marginRight:8}}>⚠ {alertCount} vencida{alertCount>1?"s":""}</span>}
                      {upcomingCount>0&&<span style={{color:"#f39c12"}}>⏰ {upcomingCount} próxima{upcomingCount>1?"s":""}</span>}
                    </div>
                  </div>

                  <div className="alert-panel-body">
                    {allAlertasFull.length===0?(
                      <div className="alert-panel-empty">
                        <div className="alert-panel-empty-icon">🔕</div>
                        <div>Sin alertas configuradas</div>
                        <div style={{fontSize:10,marginTop:4,color:"#3a3a3a"}}>Podés agregar recordatorios desde proyectos, clientes o proveedores</div>
                      </div>
                    ):(
                      allAlertasFull.map((a,i)=>{
                        const tipoTab = a.tipo==="cliente"?"clientes":a.tipo==="proveedor"?"proveedores":"proyectos";
                        const tipoLabel = a.tipo==="cliente"?"👤 Cliente":a.tipo==="proveedor"?"🏭 Proveedor":"📁 Proyecto";
                        return(
                          <div key={a.id+"-"+i} className="alert-item" onClick={()=>{setBellOpen(false);setTab(tipoTab);}}>
                            <div className="alert-item-top">
                              <div className="alert-item-proyecto">{a.nombre}</div>
                              <div className={`alert-item-date ${a.overdue?"overdue":"upcoming"}`}>
                                {a.overdue?"⚠ VENCIDA":""} {fmtDate(a.alertaFecha)}
                              </div>
                            </div>
                            <div className="alert-item-texto">{a.alertaTexto||<span style={{fontStyle:"italic",color:"#3a3a3a"}}>Sin descripción</span>}</div>
                            <div className="alert-item-feria">
                              <span style={{color:"#3a3a3a",marginRight:6}}>{tipoLabel}</span>
                              {a.subtitulo&&<span>{a.subtitulo}</span>}
                            </div>
                          </div>
                        );
                      })
                    )}
                  </div>

                  {allAlertasFull.length>0&&(
                    <div className="alert-panel-footer">
                      <div style={{display:"flex",gap:16,justifyContent:"center"}}>
                        <div className="alert-panel-link" onClick={()=>{setBellOpen(false);setTab("proyectos");}}>Proyectos</div>
                        <div className="alert-panel-link" onClick={()=>{setBellOpen(false);setTab("clientes");}}>Clientes</div>
                        <div className="alert-panel-link" onClick={()=>{setBellOpen(false);setTab("proveedores");}}>Proveedores</div>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>

            <div className="hdr-user">{user.email}</div>
            <button className="btn-logout" onClick={logout}>Salir</button>
          </div>
        </header>
        <nav className="nav">
          {TABS.map(t=>(
            <div key={t.id} className={`nav-item${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
              <div className="nav-dot" style={{background:tab===t.id?t.dot:"#3a3a3a"}}></div>
              {t.label}
            </div>
          ))}
        </nav>
      </div>

      <div className="hero">
        <div className="hero-ey">Galerie — Gestión de Proyectos</div>
        <h1 className="hero-title">
          {tab==="dashboard"&&"Dashboard"}
          {tab==="proyectos"&&"Proyectos"}
          {tab==="cotizacion"&&"Nueva Cotización"}
          {tab==="ferias"&&"Ferias"}
          {tab==="clientes"&&"Clientes"}
          {tab==="proveedores"&&"Proveedores"}
        </h1>
        <div className="hero-sub">
          {tab==="dashboard"&&`${activeCount} activos · ${projects.data.filter(p=>p.etapa==="completado").length} completados · ${clients.data.length} clientes · ${ferias.data.length} ferias`}
          {tab==="proyectos"&&`${projects.data.length} proyectos · ${alertCount>0?alertCount+" alertas vencidas · ":""}${upcomingCount>0?upcomingCount+" próximas 7 días":""}`}
          {tab==="cotizacion"&&"Seleccioná un proyecto existente o calculá uno nuevo"}
          {tab==="ferias"&&`${ferias.data.length} ferias registradas`}
          {tab==="clientes"&&`${clients.data.length} clientes · códigos G00001...`}
          {tab==="proveedores"&&`${suppliers.data.length} proveedores · códigos S00001...`}
        </div>
      </div>

      {tab==="dashboard"&&<Dashboard projects={projects.data} ferias={ferias.data} onTabChange={setTab} allAlertas={allAlertasFull}/>}
      {tab==="proyectos"&&<ProjectsList projects={projects.data} onUpdate={projects.update} onDelete={projects.remove} onAdd={handleAddProject} clients={clients.data} ferias={ferias.data} suppliers={suppliers.data}/>}
      {tab==="cotizacion"&&<div className="page"><BudgetCalc onSave={handleSaveFromCalc} allProjects={projects.data} clients={clients.data} ferias={ferias.data} suppliers={suppliers.data}/></div>}
      {tab==="ferias"&&<FeriasSection ferias={ferias} projects={projects.data}/>}
      {tab==="clientes"&&<EntitySection title="Clientes" icon="👤" collection={clients} codePrefix="G" genCode={genClientCode} nameField="empresa"/>}
      {tab==="proveedores"&&<EntitySection title="Proveedores" icon="🏭" collection={suppliers} codePrefix="S" genCode={genSupplierCode} extraFields={[{key:"especialidad",label:"Especialidad",placeholder:"ej. Montaje de stands, Carpintería..."}]} nameField="empresa"/>}

      <footer className="footer">
        <div className="footer-logo">GALERIE</div>
        <div className="footer-info">galerie-expo.com · Sistema Interno</div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
