  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #f0eeeb; font-family: 'Poppins', sans-serif; font-weight: 300; color: #262626; min-height: 100vh; }
    #root { min-height: 100vh; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #f0eeeb; }
    ::-webkit-scrollbar-thumb { background: #b1ada2; }

    /* ── STICKY SHELL ── */
    .sticky-shell { position: sticky; top: 0; z-index: 200; }

    /* ── HEADER ── */
    .hdr { background: #262626; height: 64px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #b1ada2; }
    .hdr-logo { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: 6px; color: #e5e3e0; text-transform: uppercase; cursor: pointer; }
    .hdr-right { display: flex; align-items: center; gap: 16px; }
    .hdr-pill { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #b1ada2; border: 1px solid #b1ada244; padding: 5px 14px; font-family: 'Poppins', sans-serif; }
    .hdr-user { font-size: 10px; color: #818181; letter-spacing: 1px; }
    .btn-logout { background: transparent; border: 1px solid #3a3a3a; color: #818181; padding: 6px 14px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: 'Poppins', sans-serif; transition: all .15s; }
    .btn-logout:hover { border-color: #818181; color: #e5e3e0; }

    /* ── NAV ── */
    .nav { background: #1e1e1e; border-bottom: 1px solid #2a2a2a; display: flex; overflow-x: auto; }
    .nav-item { padding: 0 28px; height: 44px; display: flex; align-items: center; gap: 8px; font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: #818181; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; font-family: 'Poppins', sans-serif; }
    .nav-item:hover { color: #b1ada2; }
    .nav-item.active { color: #e5e3e0; border-bottom-color: #b1ada2; }
    .nav-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* ── LOGIN ── */
    .login-wrap { min-height: 100vh; background: #262626; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 380px; }
    .login-logo { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: 8px; color: #e5e3e0; text-align: center; margin-bottom: 6px; }
    .login-sub { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #818181; text-align: center; margin-bottom: 48px; font-family: 'Poppins', sans-serif; }
    .login-field { margin-bottom: 14px; }
    .login-label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: #818181; display: block; margin-bottom: 6px; font-family: 'Poppins', sans-serif; }
    .login-input { width: 100%; background: #1a1a1a; border: 1px solid #3a3a3a; color: #e5e3e0; padding: 13px 16px; font-family: 'Poppins', sans-serif; font-size: 13px; outline: none; border-radius: 0; }
    .login-input:focus { border-color: #b1ada2; }
    .login-btn { width: 100%; background: #e5e3e0; color: #262626; border: none; padding: 16px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: opacity .15s; }
    .login-btn:hover { opacity: .88; }
    .login-error { background: #3a1a1a; border: 1px solid #e74c3c44; color: #e74c3c; padding: 10px 14px; font-size: 11px; margin-top: 12px; text-align: center; }

    /* ── LAYOUT ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
    .page-wide { max-width: 1300px; margin: 0 auto; padding: 32px 24px 80px; }

    /* ── HERO ── */
    .hero { background: #262626; padding: 40px 40px 32px; }
    .hero-ey { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: #b1ada2; margin-bottom: 8px; }
    .hero-title { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 32px; color: #e5e3e0; line-height: 1.1; }
    .hero-sub { font-size: 12px; color: #818181; margin-top: 8px; }

    /* ── CARDS ── */
    .card { background: #fff; border: 1px solid #e5e3e0; margin-bottom: 14px; }
    .card-hdr { background: #f0eeeb; padding: 14px 24px; border-bottom: 1px solid #e5e3e0; display: flex; align-items: center; justify-content: space-between; gap: 14px; }
    .card-hdr-left { display: flex; align-items: center; gap: 14px; }
    .step { width: 26px; height: 26px; background: #262626; color: #e5e3e0; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-title { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: #262626; }
    .card-body { padding: 24px; }

    /* ── STAT CARDS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .stat-card { background: #fff; border: 1px solid #e5e3e0; padding: 20px 22px; }
    .stat-lbl { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: #818181; margin-bottom: 10px; font-family: 'Poppins', sans-serif; }
    .stat-val { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 28px; color: #262626; line-height: 1; }
    .stat-sub { font-size: 10px; color: #b1ada2; margin-top: 6px; }
    .stat-card.dark { background: #262626; border-color: #262626; }
    .stat-card.dark .stat-lbl { color: #818181; }
    .stat-card.dark .stat-val { color: #e5e3e0; }
    .stat-card.dark .stat-sub { color: #818181; }
    .stat-card.green { border-left: 3px solid #2ecc71; }
    .stat-card.red { border-left: 3px solid #e74c3c; }
    .stat-card.gold { border-left: 3px solid #f39c12; }

    /* ── FERIAS DASHBOARD ── */
    .feria-card { background: #fff; border: 1px solid #e5e3e0; margin-bottom: 14px; overflow: hidden; }
    .feria-hdr { background: #262626; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .feria-name { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 15px; color: #e5e3e0; letter-spacing: 1px; }
    .feria-meta { font-size: 10px; color: #818181; margin-top: 3px; }
    .feria-stats { display: flex; gap: 20px; align-items: center; }
    .feria-stat { text-align: right; }
    .feria-stat-lbl { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #818181; }
    .feria-stat-val { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 14px; color: #e5e3e0; }
    .feria-body { padding: 16px 24px; }
    .clients-list { display: flex; flex-direction: column; gap: 8px; }
    .client-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #f0eeeb; border: 1px solid #e5e3e0; }
    .client-name { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 12px; }
    .client-meta { font-size: 10px; color: #818181; margin-top: 2px; }
    .client-amount { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 13px; color: #262626; }
    .client-profit { font-size: 10px; color: #2ecc71; text-align: right; }
    .saving-badge { background: #f39c1222; border: 1px solid #f39c1244; color: #f39c12; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 10px; font-family: 'Poppins', sans-serif; }

    /* ── PROJECTS TABLE ── */
    .proj-table { width: 100%; border-collapse: collapse; }
    .proj-table th { background: #f0eeeb; padding: 10px 14px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #818181; text-align: left; border-bottom: 1px solid #e5e3e0; font-family: 'Poppins', sans-serif; font-weight: 500; }
    .proj-table td { padding: 12px 14px; border-bottom: 1px solid #f0eeeb; font-size: 12px; }
    .proj-table tr:hover td { background: #fafaf9; }
    .proj-table tr:last-child td { border-bottom: none; }

    /* ── STATUS BADGES ── */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; font-family: 'Poppins', sans-serif; border: 1px solid; white-space: nowrap; }
    .badge-exploration { background: #f0eeeb; border-color: #b1ada2; color: #818181; }
    .badge-contact { background: #fff8e6; border-color: #f39c1266; color: #f39c12; }
    .badge-design { background: #e6f0ff; border-color: #3498db44; color: #3498db; }
    .badge-quote { background: #f0e6ff; border-color: #9b59b644; color: #9b59b6; }
    .badge-accepted { background: #e6ffe6; border-color: #2ecc7144; color: #2ecc71; }
    .badge-closed { background: #ffe6e6; border-color: #e74c3c44; color: #e74c3c; }
    .badge-production { background: #fff3e6; border-color: #e67e2244; color: #e67e22; }
    .badge-completed { background: #262626; border-color: #262626; color: #e5e3e0; }

    /* ── PIPELINE STAGES ── */
    .pipeline { display: flex; align-items: stretch; gap: 0; margin-bottom: 24px; overflow-x: auto; padding-bottom: 4px; }
    .pipe-stage { flex: 1; min-width: 120px; border: 1px solid #e5e3e0; border-right: none; background: #fff; padding: 14px 16px; position: relative; cursor: pointer; transition: background .15s; }
    .pipe-stage:last-child { border-right: 1px solid #e5e3e0; }
    .pipe-stage.active { background: #262626; }
    .pipe-stage::after { content: '›'; position: absolute; right: -10px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #b1ada2; z-index: 1; }
    .pipe-stage:last-child::after { display: none; }
    .pipe-lbl { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #818181; margin-bottom: 6px; font-family: 'Poppins', sans-serif; }
    .pipe-count { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 24px; color: #262626; }
    .pipe-stage.active .pipe-lbl { color: #818181; }
    .pipe-stage.active .pipe-count { color: #e5e3e0; }
    .pipe-sub { font-size: 9px; color: #b1ada2; margin-top: 3px; }
    .pipe-stage.active .pipe-sub { color: #818181; }

    /* ── FORMS ── */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .g4 { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 14px; }
    .fg { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: #818181; font-weight: 500; font-family: 'Poppins', sans-serif; }
    input, select, textarea { font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 400; color: #262626; background: #f0eeeb; border: 1px solid #e5e3e0; padding: 10px 13px; width: 100%; outline: none; transition: border-color .15s, background .15s; -webkit-appearance: none; appearance: none; border-radius: 0; }
    input:focus, select:focus, textarea:focus { border-color: #818181; background: #fff; }
    textarea { resize: vertical; min-height: 80px; }
    .pfx { display: flex; }
    .pfx-tag { background: #e5e3e0; border: 1px solid #e5e3e0; border-right: none; padding: 10px 12px; font-size: 11px; color: #818181; display: flex; align-items: center; white-space: nowrap; font-family: 'Poppins', sans-serif; flex-shrink: 0; }
    .pfx input { border-left: none; }
    .sfx { display: flex; }
    .sfx input { border-right: none; }
    .sfx-tag { background: #e5e3e0; border: 1px solid #e5e3e0; border-left: none; padding: 10px 12px; font-size: 11px; color: #818181; display: flex; align-items: center; font-family: 'Poppins', sans-serif; }
    .hint { font-size: 10px; color: #b1ada2; font-style: italic; margin-top: 3px; }
    .subtotal { font-size: 11px; color: #818181; font-style: italic; margin-top: 10px; }
    .subtotal strong { color: #262626; font-style: normal; font-weight: 500; }

    /* ── BUTTONS ── */
    .btn-dark { background: #262626; color: #e5e3e0; border: none; padding: 11px 24px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: background .15s; }
    .btn-dark:hover { background: #1a1a1a; }
    .btn-dark:disabled { background: #b1ada2; cursor: not-allowed; }
    .btn-warm { background: #b1ada2; color: #fff; border: none; padding: 11px 22px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: opacity .15s; }
    .btn-warm:hover { opacity: .85; }
    .btn-ghost { background: transparent; color: #818181; border: 1px solid #e5e3e0; padding: 10px 18px; font-family: 'Poppins', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: border-color .15s; }
    .btn-ghost:hover { border-color: #818181; color: #262626; }
    .btn-danger { background: #e74c3c22; color: #e74c3c; border: 1px solid #e74c3c44; padding: 8px 16px; font-family: 'Poppins', sans-serif; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all .15s; }
    .btn-danger:hover { background: #e74c3c; color: #fff; }
    .btn-success { background: #2ecc7122; color: #2ecc71; border: 1px solid #2ecc7144; padding: 8px 16px; font-family: 'Poppins', sans-serif; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all .15s; }
    .btn-success:hover { background: #2ecc71; color: #fff; }

    /* ── MODAL ── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal { background: #fff; width: 100%; max-width: 720px; max-height: 90vh; overflow-y: auto; }
    .modal-hdr { background: #262626; padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; }
    .modal-title { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 14px; color: #e5e3e0; letter-spacing: 2px; text-transform: uppercase; }
    .modal-close { background: none; border: none; color: #818181; font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; }
    .modal-close:hover { color: #e5e3e0; }
    .modal-body { padding: 28px; }
    .modal-footer { padding: 16px 28px; border-top: 1px solid #e5e3e0; display: flex; gap: 12px; justify-content: flex-end; background: #f0eeeb; }

    /* ── SECTION DIVIDER ── */
    .div-label { text-align: center; margin: 28px 0; position: relative; }
    .div-label::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #e5e3e0; }
    .div-label span { position: relative; background: #f0eeeb; padding: 0 16px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #818181; }

    /* ── RESULTS ── */
    .results { background: #262626; color: #e5e3e0; }
    .res-top { padding: 28px 36px 20px; border-bottom: 1px solid #3a3a3a; }
    .res-ey { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: #b1ada2; margin-bottom: 6px; font-family: 'Poppins', sans-serif; }
    .res-title { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 20px; line-height: 1.3; }
    .res-sub { font-size: 12px; color: #818181; margin-top: 4px; }
    .res-body { padding: 0 36px 28px; }
    .res-sect { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 6px; border-bottom: 1px solid #3a3a3a; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: #b1ada2; }
    .res-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #2a2a2a; font-size: 12px; }
    .res-row.ind { padding-left: 16px; color: rgba(255,255,255,.45); font-size: 11px; }
    .res-amt { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500; font-size: 13px; }
    .res-amt.neg { color: #e74c3c; }
    .res-amt.pos { color: #2ecc71; }
    .res-amt.gold { color: #f39c12; }
    .res-neto { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; margin-top: 8px; }
    .res-neto span:first-child { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #e5e3e0; }
    .big-box { margin: 0 36px 24px; border: 1px solid #3a3a3a; padding: 28px; text-align: center; position: relative; overflow: hidden; }
    .big-box::before { content: 'GALERIE'; position: absolute; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 80px; letter-spacing: 10px; color: rgba(255,255,255,.025); top: 50%; left: 50%; transform: translate(-50%,-50%); white-space: nowrap; pointer-events: none; }
    .big-lbl { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: #b1ada2; font-family: 'Poppins', sans-serif; margin-bottom: 8px; }
    .big-val { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 52px; color: #e5e3e0; line-height: 1; letter-spacing: -1px; }
    .big-sub { font-size: 10px; color: #818181; margin-top: 6px; }
    .res-tags { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 36px 20px; }
    .tag { background: rgba(255,255,255,.06); border: 1px solid #3a3a3a; color: #b1ada2; font-family: 'Poppins', sans-serif; font-size: 10px; letter-spacing: 1px; padding: 4px 12px; }
    .res-actions { padding: 16px 36px 28px; border-top: 1px solid #2a2a2a; display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-ghost-inv { background: transparent; color: rgba(255,255,255,.5); border: 1px solid #3a3a3a; padding: 11px 20px; font-family: 'Poppins', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
    .btn-ghost-inv:hover { border-color: #818181; color: #e5e3e0; }

    /* ── TRAVEL BADGES ── */
    .tbadges { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 18px; }
    .tbadge { border: 1px solid #e5e3e0; padding: 14px 16px; background: #f0eeeb; }
    .tb-lbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #818181; font-family: 'Poppins', sans-serif; margin-bottom: 6px; }
    .tb-val { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 18px; color: #262626; }
    .tb-sub { font-size: 10px; color: #b1ada2; margin-top: 2px; }

    /* ── NOTE BOX ── */
    .note-box { background: #f0eeeb; border-left: 3px solid #b1ada2; padding: 12px 16px; margin-top: 12px; font-size: 11px; color: #262626; line-height: 1.6; }

function getDef(city) {
  const l = (city||"").toLowerCase().trim();
  // Busca match exacto primero, luego parcial
  let entry = null;
  for(const [k,v] of Object.entries(CITY_MAP)) {
    if(l === k) { entry=v; break; }
  }
  if(!entry) {
    for(const [k,v] of Object.entries(CITY_MAP)) {
      if(l.includes(k) || k.includes(l)) { entry=v; break; }
    }
  }
  if(!entry) {
    // Fallback inteligente por palabras clave regionales
    if(l.includes("eur")||["germany","france","italy","spain","uk"].some(x=>l.includes(x))) entry={r:"europa_oeste",dF:0,dH:0,dD:0};
    else if(["usa","united states","estados unidos"].some(x=>l.includes(x))) entry={r:"usa_este",dF:0,dH:0,dD:0};
    else entry={r:"default",dF:0,dH:0,dD:0};
  }
  const base = REGION_BASE[entry.r] || REGION_BASE.default;
  return {
    f: Math.round((base.f + (entry.dF||0)) * FERIA_FACTOR),
    h: Math.round(base.h + (entry.dH||0)),
    d: Math.round(base.d + (entry.dD||0)),
    region: entry.r,
  };
}
function rooms(pax) { return pax<=2?1:pax<=4?2:3; }
function nightsBetween(d1,d2) {
  if(!d1||!d2) return 0;
  const diff=Math.round((new Date(d2)-new Date(d1))/86400000);
  return diff>0?diff:0;
}

/* ══════════════════════════════════════════════
   FIREBASE BRIDGE
══════════════════════════════════════════════ */
function useProjects() {
  const [projects, setProjects] = useState(DEMO_PROJECTS);
  const [fbMode, setFbMode] = useState(false);
  const fb = window.__galerie_firebase;

  useEffect(() => {
    if(!fb?.db) return;
    try {
      const { collection, query, orderBy, onSnapshot } = fb;
      const q = query(collection(fb.db,"projects"), orderBy("updatedAt","desc"));
      const unsub = onSnapshot(q, snap => {
        const data = snap.docs.map(d=>({id:d.id,...d.data(),
          createdAt:d.data().createdAt?.toDate?.()??new Date(),
          updatedAt:d.data().updatedAt?.toDate?.()??new Date()
        }));
        setProjects(data);
        setFbMode(true);
      }, ()=>{});
      return unsub;
    } catch(e){}
  },[]);

  const addProject = async (proj) => {
    if(fb?.db) {
      const { collection, addDoc, serverTimestamp } = fb;
      await addDoc(collection(fb.db,"projects"),{...proj,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
    } else {
      setProjects(p=>[{id:"p"+Date.now(),...proj,createdAt:new Date(),updatedAt:new Date()},...p]);
    }
  };

  const updateProject = async (id, data) => {
    if(fb?.db) {
      const { doc, updateDoc, serverTimestamp } = fb;
      await updateDoc(doc(fb.db,"projects",id),{...data,updatedAt:serverTimestamp()});
    } else {
      setProjects(p=>p.map(x=>x.id===id?{...x,...data,updatedAt:new Date()}:x));
    }
  };

  const deleteProject = async (id) => {
    if(fb?.db) {
      const { doc, deleteDoc } = fb;
      await deleteDoc(doc(fb.db,"projects",id));
    } else {
      setProjects(p=>p.filter(x=>x.id!==id));
    }
  };

  return { projects, addProject, updateProject, deleteProject, fbMode };
}

/* ══════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════ */
function useAuth() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const fb = window.__galerie_firebase;

  useEffect(() => {
    if(!fb?.auth) { setLoading(false); return; }
    const unsub = fb.onAuthStateChanged(fb.auth, u=>{ setUser(u); setLoading(false); });
    return unsub;
  },[]);

  const login = async (email, pass) => {
    if(!fb?.auth) {
      // demo mode
      if(email==="info@galerie-expo.com"&&pass==="Galerie270925") {
        setUser({email,displayName:"Galerie Admin"});
      } else throw new Error("Credenciales incorrectas");
      return;
    }
    await fb.signInWithEmailAndPassword(fb.auth, email, pass);
  };

  const logout = async () => {
    if(!fb?.auth) { setUser(null); return; }
    await fb.signOut(fb.auth);
  };

  return { user, loading, login, logout };
}

function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState("info@galerie-expo.com");
  const [pass, setPass] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async () => {

  return (

}

/* ══════════════════════════════════════════════
   STAGE TRACKER COMPONENT
══════════════════════════════════════════════ */
function StageTracker({ currentStage, onStageClick, compact=false }) {
  const stageIdx = STAGES.findIndex(s=>s.id===currentStage);
  const isLost = currentStage==="perdido";

  return (
    <div className="stage-track">
      {STAGES.map((s,i)=>{
        const done = !isLost && i < stageIdx;
        const curr = !isLost && s.id === currentStage;
        const cls = done?"done":curr?"current":"";
        return (
          <div key={s.id} className={`stage-item ${cls}`} onClick={()=>onStageClick&&onStageClick(s.id)}>
            <div className={`stage-dot ${cls}`}>{done?"✓":i+1}</div>
            {!compact && <div className="stage-lbl">{s.label}</div>}
          </div>
        );
      })}
      {isLost && (
        <div className="stage-item failed">
          <div className="stage-dot failed">✕</div>
          {!compact && <div className="stage-lbl" style={{color:"#e74c3c"}}>Perdido</div>}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   BUDGET CALCULATOR (standalone or embedded)
══════════════════════════════════════════════ */
function BudgetCalc({ onSave, initialData={}, companyClients=[] }) {
  const [form, setForm] = useState({
    proyecto: initialData.proyecto||"",
    cliente: initialData.cliente||"",
    feria: initialData.feria||"",
    destino: initialData.destino||"",
    llegada: initialData.llegada||"",
    partida: initialData.partida||"",
    personas: initialData.personas||"2",
    costoStand: initialData.costoStand||"",
    costoCatering: initialData.costoCatering||"",
    costoServicios: initialData.costoServicios||"",
    moneda: initialData.moneda||"USD",
    gastosAdminPct: initialData.gastosAdminPct ? String(initialData.gastosAdminPct*100) : "5",
    resultadoEsperado: "",
    notas: initialData.notas||"",
    etapa: initialData.etapa||"exploracion",
  });
  const [travel, setTravel] = useState({
    flight: initialData.flightCostPax ? String(initialData.flightCostPax) : "",
    hotel: initialData.hotelCostNight ? String(initialData.hotelCostNight) : "",
    daily: initialData.dailyCostPax ? String(initialData.dailyCostPax) : "",
  });
  const [result, setResult] = useState(null);
  const [sharedCostNote, setSharedCostNote] = useState(null);
  const resRef = useRef(null);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const n = nightsBetween(form.llegada, form.partida);
  const pax = parseInt(form.personas)||1;

  // Check if there are other projects going to same feria (cost sharing)
  const sameFeraProjects = companyClients.filter(p =>
    p.feria === form.feria && p.destino?.toLowerCase() === form.destino?.toLowerCase()
  );
  const totalClientsOnFeria = sameFeraProjects.length + 1;

  const onDestinoBlur = () => {
    if(!form.destino) return;
    const d = getDef(form.destino);
    setTravel({ flight: String(d.f), hotel: String(d.h), daily: String(d.d) });
  };

  const calcular = () => {
    const cs = parseFloat(form.costoStand)||0;
    const cc = parseFloat(form.costoCatering)||0;
    const cv = parseFloat(form.costoServicios)||0;
    const top = cs+cc+cv;

    const flightUnit = parseFloat(travel.flight)||0;
    const hotelUnit  = parseFloat(travel.hotel)||0;
    const dailyUnit  = parseFloat(travel.daily)||0;

    // Cost sharing logic — travel costs divided among all clients at same feria
    const divisor = totalClientsOnFeria;
    const ft  = (flightUnit * pax) / divisor;
    const ht  = (hotelUnit * n * rooms(pax)) / divisor;
    const dt  = (dailyUnit * n * pax) / divisor;
    const trep = ft+ht+dt;

    const pct = (parseFloat(form.gastosAdminPct)/100)||0.05;
    const neto = parseFloat(form.resultadoEsperado)||0;
    const costos = top+trep;
    const rb = neto/0.75;
    const ingresos = costos + rb/(1-pct);
    const ga = (ingresos-costos)*pct;
    const rbc = ingresos-costos-ga;
    const irae = rbc*0.25;

    const r = {
      ingresos, costoStand:cs, costoCatering:cc, costoServicios:cv, totalOperativos:top,
      flightTotal:ft, hotelTotal:ht, dailyTotal:dt, totalRepresentacion:trep,
      flightCostPax:flightUnit, hotelCostNight:hotelUnit, dailyCostPax:dailyUnit,
      gastosAdminPct:pct, gastosAdmin:ga, rentaBruta:rbc, irae, neto:rbc-irae,
      moneda:form.moneda, personas:pax, nights:n,
      proyecto:form.proyecto, cliente:form.cliente, feria:form.feria, destino:form.destino,
      costoViajeFull: flightUnit*pax*2 + hotelUnit*n*rooms(pax) + dailyUnit*n*pax,
      divisor,
    };
    setResult(r);
    if(divisor>1) setSharedCostNote(`Costos de viaje divididos entre ${divisor} clientes en ${form.feria}.`);
    else setSharedCostNote(null);
    setTimeout(()=>resRef.current?.scrollIntoView({behavior:"smooth"}),100);
  };

  const canCalc = form.costoStand && form.resultadoEsperado && travel.flight && travel.hotel && travel.daily && n>0;

  const handleSave = () => {
    if(!result||!onSave) return;
    onSave({
      ...form,
      personas: pax,
      gastosAdminPct: result.gastosAdminPct,
      ingresos: result.ingresos,
      costoStand: result.costoStand,
      costoCatering: result.costoCatering,
      costoServicios: result.costoServicios,
      flightTotal: result.flightTotal,
      hotelTotal: result.hotelTotal,
      dailyTotal: result.dailyTotal,
      flightCostPax: result.flightCostPax,
      hotelCostNight: result.hotelCostNight,
      dailyCostPax: result.dailyCostPax,
      gastosAdmin: result.gastosAdmin,
      rentaBruta: result.rentaBruta,
      irae: result.irae,
      neto: result.neto,
      totalRepresentacion: result.totalRepresentacion,
      totalOperativos: result.totalOperativos,
    });
  };

  return (
    <div>
      {/* 1 — Proyecto */}
      <div className="card">
        <div className="card-hdr"><div className="card-hdr-left"><span className="step">1</span><span className="card-title">Información del Proyecto</span></div></div>
        <div className="card-body">
          <div className="g2" style={{marginBottom:14}}>
            <div className="fg"><label>Proyecto / Cliente</label><input placeholder="ej. BILBOSA" value={form.proyecto} onChange={e=>set("proyecto",e.target.value)} /></div>
            <div className="fg"><label>Stand / Descripción</label><input placeholder="ej. Stand Pabellón B 24m²" value={form.cliente} onChange={e=>set("cliente",e.target.value)} /></div>
            <div className="fg"><label>Nombre de la Feria</label><input placeholder="ej. Seafood Barcelona 2026" value={form.feria} onChange={e=>set("feria",e.target.value)} /></div>
            <div className="fg">
              <label>Moneda del Presupuesto</label>
              <select value={form.moneda} onChange={e=>set("moneda",e.target.value)}>
                <option value="USD">USD — Dólar Americano</option>
                <option value="EUR">EUR — Euro</option>
                <option value="UYU">UYU — Peso Uruguayo</option>
              </select>
            </div>
            <div className="fg">
              <label>Etapa Actual</label>
              <select value={form.etapa} onChange={e=>set("etapa",e.target.value)}>
                {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                <option value="perdido">Perdido</option>
              </select>
            </div>
            {onSave && (
              <div className="fg"><label>Notas</label><textarea value={form.notas} onChange={e=>set("notas",e.target.value)} placeholder="Observaciones, estado, etc." /></div>
            )}
          </div>
          {sameFeraProjects.length>0 && (
            <div className="note-box savings">
              <strong>⚡ Licuación de Costos Detectada</strong>
              Hay {sameFeraProjects.length} proyecto{sameFeraProjects.length>1?"s":""} más en {form.feria}: {sameFeraProjects.map(p=>p.proyecto).join(", ")}.
              Los costos de viaje se dividirán en {totalClientsOnFeria} partes.
            </div>
          )}
        </div>
      </div>

      {/* 2 — Costos Operativos */}
      <div className="card">
        <div className="card-hdr"><div className="card-hdr-left"><span className="step">2</span><span className="card-title">Costos Operativos del Stand</span></div></div>
        <div className="card-body">
          <div className="g3">
            <div className="fg"><label>Stand / Montaje</label><div className="pfx"><span className="pfx-tag">{form.moneda}</span><input type="number" placeholder="0" value={form.costoStand} onChange={e=>set("costoStand",e.target.value)} /></div></div>
            <div className="fg"><label>Catering</label><div className="pfx"><span className="pfx-tag">{form.moneda}</span><input type="number" placeholder="0" value={form.costoCatering} onChange={e=>set("costoCatering",e.target.value)} /></div></div>
            <div className="fg"><label>Otros Servicios</label><div className="pfx"><span className="pfx-tag">{form.moneda}</span><input type="number" placeholder="0" value={form.costoServicios} onChange={e=>set("costoServicios",e.target.value)} /></div></div>
          </div>
        </div>
      </div>

      {/* 3 — Representación */}
      <div className="card">
        <div className="card-hdr">
          <div className="card-hdr-left"><span className="step">3</span><span className="card-title">Costos de Representación</span></div>
          {totalClientsOnFeria>1 && <span className="saving-badge">÷{totalClientsOnFeria} clientes</span>}
        </div>
        <div className="card-body">
          <div className="g4">
            <div className="fg">
              <label>Ciudad destino</label>
              <input placeholder="ej. Barcelona, Paris, Dubai..." value={form.destino}
                onChange={e=>set("destino",e.target.value)} onBlur={onDestinoBlur} />
            </div>
            <div className="fg">
              <label>Personas</label>
              <select value={form.personas} onChange={e=>set("personas",e.target.value)}>
                {[1,2,3,4,5,6].map(x=><option key={x} value={x}>{x} pax</option>)}
              </select>
            </div>
            <div className="fg"><label>Llegada</label><input type="date" value={form.llegada} onChange={e=>set("llegada",e.target.value)} /></div>
            <div className="fg"><label>Partida</label><input type="date" value={form.partida} onChange={e=>set("partida",e.target.value)} /></div>

          {n>0 && <p className="subtotal" style={{marginTop:10}}><strong>{n} noches · {pax} persona{pax>1?"s":""}</strong>{totalClientsOnFeria>1 && <span style={{color:"#f39c12"}}> · Costos de viaje prorrateados entre {totalClientsOnFeria} clientes</span>}</p>}

              <span className="tag">{result.moneda}</span>
              {result.divisor>1 && <span className="tag" style={{borderColor:"#f39c1244",color:"#f39c12"}}>÷{result.divisor} clientes</span>}
            </div>

            <div className="res-actions">
              {onSave && <button className="btn-dark" onClick={handleSave}>◆  GUARDAR PROYECTO</button>}
              <button className="btn-ghost-inv" onClick={()=>{setResult(null);window.scrollTo({top:0,behavior:"smooth"});}}>Nuevo cálculo</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   DASHBOARD VIEW
══════════════════════════════════════════════ */
function Dashboard({ projects }) {
  const active = projects.filter(p=>!["completado","perdido"].includes(p.etapa));
  const completed = projects.filter(p=>p.etapa==="completado");
  const lost = projects.filter(p=>p.etapa==="perdido");
  const revenue = completed.reduce((a,p)=>a+(p.ingresos||0),0);
  const netProfit = completed.reduce((a,p)=>a+(p.neto||0),0);

  // Group by feria
  const byFeria = {};
  projects.forEach(p => {
    if(!p.feria) return;
    if(!byFeria[p.feria]) byFeria[p.feria]={ projects:[], destino:p.destino };
    byFeria[p.feria].projects.push(p);
  });

  const feriaData = Object.entries(byFeria).map(([name,{projects:ps,destino}])=>{
    const activos = ps.filter(p=>!["perdido"].includes(p.etapa));
    const totalIngresos = activos.reduce((a,p)=>a+(p.ingresos||0),0);
    const totalNeto = activos.reduce((a,p)=>a+(p.neto||0),0);
    // travel cost that would be without sharing
    const travelFull = ps[0] ? ((ps[0].flightCostPax||0)*2*(ps[0].personas||2) + (ps[0].hotelCostNight||0)*nightsBetween(ps[0].llegada,ps[0].partida)*rooms(ps[0].personas||2) + (ps[0].dailyCostPax||0)*nightsBetween(ps[0].llegada,ps[0].partida)*(ps[0].personas||2)) : 0;
    const travelSaved = activos.length>1 ? travelFull*(activos.length-1)/activos.length : 0;
    return { name, destino, ps: activos, totalIngresos, totalNeto, travelSaved };
  }).sort((a,b)=>b.totalIngresos-a.totalIngresos);

  // Pipeline counts
  const stageCounts = {};
  STAGES.forEach(s=>{ stageCounts[s.id]=projects.filter(p=>p.etapa===s.id).length; });

  return (
    <div className="page-wide">
      {/* Stats */}
      <div className="stats-grid">
        <div className="stat-card dark">
          <div className="stat-lbl">Proyectos Activos</div>
          <div className="stat-val">{active.length}</div>
          <div className="stat-sub">{projects.length} proyectos en total</div>
        </div>
        <div className="stat-card green">
          <div className="stat-lbl">Proyectos Completados</div>
          <div className="stat-val">{completed.length}</div>
          <div className="stat-sub">Tasa éxito: {projects.length ? Math.round(completed.length/projects.length*100) : 0}%</div>
        </div>
        <div className="stat-card gold">
          <div className="stat-lbl">Revenue Total (Completados)</div>
          <div className="stat-val" style={{fontSize:20}}>USD {fmt(revenue)}</div>
          <div className="stat-sub">Neto: USD {fmt(netProfit)}</div>
        </div>
        <div className="stat-card red">
          <div className="stat-lbl">Perdidos</div>
          <div className="stat-val">{lost.length}</div>
          <div className="stat-sub">{projects.length ? Math.round(lost.length/projects.length*100) : 0}% tasa de pérdida</div>
        </div>
      </div>

      {/* Pipeline */}
      <div style={{marginBottom:24}}>
        <div style={{fontSize:"9px",letterSpacing:"2.5px",textTransform:"uppercase",color:"#818181",marginBottom:12,fontFamily:"'Poppins',sans-serif"}}>Pipeline de Proyectos</div>
        <div className="pipeline">
          {STAGES.slice(0,6).map(s=>(
            <div key={s.id} className="pipe-stage">
              <div className="pipe-lbl">{s.label}</div>
              <div className="pipe-count">{stageCounts[s.id]||0}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Por Feria */}
      <div style={{fontSize:"9px",letterSpacing:"2.5px",textTransform:"uppercase",color:"#818181",marginBottom:12,fontFamily:"'Poppins',sans-serif"}}>Potencial por Feria</div>
      {feriaData.length===0 && <div className="empty"><div className="empty-icon">📊</div><div className="empty-title">Sin datos de ferias</div><div className="empty-sub">Agregá proyectos para ver el dashboard por feria</div></div>}
      {feriaData.map(fd=>(
        <div key={fd.name} className="feria-card">
          <div className="feria-hdr">
            <div>
              <div className="feria-name">{fd.name}</div>
              <div className="feria-meta">{fd.destino} · {fd.ps.length} cliente{fd.ps.length!==1?"s":""} en esta feria</div>
            </div>
            <div className="feria-stats">
              {fd.travelSaved>0 && (
                <div className="feria-stat">
                  <div className="feria-stat-lbl">Ahorro viaje</div>
                  <div className="feria-stat-val" style={{color:"#f39c12"}}>+{fc("USD",fd.travelSaved)}</div>
                </div>
              )}
              <div className="feria-stat">
                <div className="feria-stat-lbl">Ingresos totales</div>
                <div className="feria-stat-val">{fc(fd.ps[0]?.moneda||"USD",fd.totalIngresos)}</div>
              </div>
              <div className="feria-stat">
                <div className="feria-stat-lbl">Neto total</div>
                <div className="feria-stat-val" style={{color:"#2ecc71"}}>{fc(fd.ps[0]?.moneda||"USD",fd.totalNeto)}</div>
              </div>
            </div>
          </div>
          <div className="feria-body">
            <div className="clients-list">
              {fd.ps.map(p=>(
                <div key={p.id} className="client-row">
                  <div>
                    <div className="client-name">{p.proyecto}</div>
                    <div className="client-meta">{p.cliente} · <span className={`badge ${STAGE_BADGE[p.etapa]||""}`}>{STAGES.find(s=>s.id===p.etapa)?.label||p.etapa}</span></div>
                  </div>
                  <div>
                    <div className="client-amount">{fc(p.moneda,p.ingresos)}</div>
                    <div className="client-profit">Neto: {fc(p.moneda,p.neto)}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════
   PROJECT DETAIL MODAL — Full edit
══════════════════════════════════════════════ */
function ProjectModal({ project, onClose, onUpdate, onDelete, allProjects }) {
  const [mode, setMode] = useState("view"); // "view" | "edit-stage" | "edit-quote"
  const [saving, setSaving] = useState(false);
  const [confirm, setConfirm] = useState(false);

  // Stage edit state
  const [newStage, setNewStage] = useState(project.etapa);
  const [notas, setNotas] = useState(project.notas||"");

  // Quote edit state — mirrors BudgetCalc fields
  const [qForm, setQForm] = useState({
    proyecto: project.proyecto||"",
    cliente: project.cliente||"",
    feria: project.feria||"",
    destino: project.destino||"",
    llegada: project.llegada||"",
    partida: project.partida||"",
    personas: String(project.personas||2),
    costoStand: String(project.costoStand||""),
    costoCatering: String(project.costoCatering||""),
    costoServicios: String(project.costoServicios||""),
    moneda: project.moneda||"USD",
    gastosAdminPct: String((project.gastosAdminPct||0.05)*100),
  });
  const [qTravel, setQTravel] = useState({
    flight: String(project.flightCostPax || Math.round((project.flightTotal||0)/(project.personas||2)) || ""),
    hotel:  String(project.hotelCostNight || ""),
    daily:  String(project.dailyCostPax || ""),
  });
  const [resultadoEsperado, setResultadoEsperado] = useState(String(project.neto||""));
  const [qResult, setQResult] = useState(null);

  const setQ = (k,v) => setQForm(f=>({...f,[k]:v}));
  const n = nightsBetween(qForm.llegada, qForm.partida);
  const pax = parseInt(qForm.personas)||1;

  const sameFeraCount = allProjects.filter(p=>p.feria===project.feria&&p.id!==project.id&&!["perdido"].includes(p.etapa)).length;
  const divisor = sameFeraCount + 1;

  const onDestinoBlur = () => {
    if(!qForm.destino) return;
    const d = getDef(qForm.destino);
    setQTravel({ flight: String(d.f), hotel: String(d.h), daily: String(d.d) });
  };

  const recalcular = () => {
    const cs = parseFloat(qForm.costoStand)||0;
    const cc = parseFloat(qForm.costoCatering)||0;
    const cv = parseFloat(qForm.costoServicios)||0;
    const top = cs+cc+cv;
    const ft = (parseFloat(qTravel.flight)||0)*pax / divisor;
    const ht = (parseFloat(qTravel.hotel)||0)*n*rooms(pax) / divisor;
    const dt = (parseFloat(qTravel.daily)||0)*n*pax / divisor;
    const trep = ft+ht+dt;
    const pct = (parseFloat(qForm.gastosAdminPct)/100)||0.05;
    const neto = parseFloat(resultadoEsperado)||0;
    const costos = top+trep;
    const rb = neto/0.75;
    const ingresos = costos + rb/(1-pct);
    const ga = (ingresos-costos)*pct;
    const rbc = ingresos-costos-ga;
    const irae = rbc*0.25;
    setQResult({
      ingresos, costoStand:cs, costoCatering:cc, costoServicios:cv, totalOperativos:top,
      flightTotal:ft, hotelTotal:ht, dailyTotal:dt, totalRepresentacion:trep,
      flightCostPax:parseFloat(qTravel.flight)||0, hotelCostNight:parseFloat(qTravel.hotel)||0,
      dailyCostPax:parseFloat(qTravel.daily)||0,
      gastosAdminPct:pct, gastosAdmin:ga, rentaBruta:rbc, irae, neto:rbc-irae,
      moneda:qForm.moneda, personas:pax, nights:n, divisor,
    });
  };

  const saveStage = async () => {
    setSaving(true);
    await onUpdate(project.id, { etapa: newStage, notas });
    setSaving(false);
    setMode("view");
  };

  const saveQuote = async () => {
    if(!qResult) return;
    setSaving(true);
    await onUpdate(project.id, {
      ...qForm,
      personas: pax,
      gastosAdminPct: qResult.gastosAdminPct,
      ingresos: qResult.ingresos,
      costoStand: qResult.costoStand,
      costoCatering: qResult.costoCatering,
      costoServicios: qResult.costoServicios,
      flightTotal: qResult.flightTotal,
      hotelTotal: qResult.hotelTotal,
      dailyTotal: qResult.dailyTotal,
      flightCostPax: qResult.flightCostPax,
      hotelCostNight: qResult.hotelCostNight,
      dailyCostPax: qResult.dailyCostPax,
      gastosAdmin: qResult.gastosAdmin,
      rentaBruta: qResult.rentaBruta,
      irae: qResult.irae,
      neto: qResult.neto,
      totalRepresentacion: qResult.totalRepresentacion,
      totalOperativos: qResult.totalOperativos,
    });
    setSaving(false);
    setMode("view");
  };

  const cur = project.moneda;

  return (
    <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:800}}>
        <div className="modal-hdr">
          <div>
            <div className="modal-title">{project.proyecto}</div>
            <div style={{fontSize:10,color:"#818181",marginTop:2,letterSpacing:1}}>{project.feria} · {project.destino}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button className="modal-close" onClick={onClose}>✕</button>
          </div>
        </div>

        {/* Tab switcher inside modal */}
        <div style={{background:"#1e1e1e",display:"flex",borderBottom:"1px solid #2a2a2a"}}>
          {[
            {id:"view",      label:"Resumen"},
            {id:"edit-stage",label:"Cambiar Etapa"},
            {id:"edit-quote",label:"Editar Cotización"},
          ].map(t=>(
            <div key={t.id}
              onClick={()=>setMode(t.id)}
              style={{
                padding:"10px 20px", fontSize:9, letterSpacing:"2px", textTransform:"uppercase",
                fontFamily:"'Poppins',sans-serif", cursor:"pointer", color:mode===t.id?"#e5e3e0":"#818181",
                borderBottom:mode===t.id?"2px solid #b1ada2":"2px solid transparent", transition:"all .15s"
              }}>
              {t.label}
            </div>
          ))}
        </div>

        <div className="modal-body">

          {/* ── VIEW MODE ── */}
          {mode==="view" && (
            <>
              <div style={{marginBottom:20}}>
                <div style={{fontSize:"9px",letterSpacing:"2px",color:"#818181",textTransform:"uppercase",marginBottom:10,fontFamily:"'Poppins',sans-serif"}}>Etapa Actual</div>
                <StageTracker currentStage={project.etapa} />
              </div>
              <div className="g2" style={{marginBottom:20}}>
                <div>
                  <div style={{fontSize:"9px",letterSpacing:"2px",color:"#818181",textTransform:"uppercase",marginBottom:4,fontFamily:"'Poppins',sans-serif"}}>Stand</div>
                  <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700}}>{project.cliente||"—"}</div>
                  <div style={{fontSize:"11px",color:"#818181"}}>{project.llegada||"—"} → {project.partida||"—"} · {project.personas||2} pax</div>
                </div>
                <div>
                  <div style={{fontSize:"9px",letterSpacing:"2px",color:"#818181",textTransform:"uppercase",marginBottom:4,fontFamily:"'Poppins',sans-serif"}}>Notas</div>
                  <div style={{fontSize:"12px",color:"#262626",lineHeight:1.5}}>{project.notas||<span style={{color:"#b1ada2"}}>Sin notas</span>}</div>
                </div>
              </div>
              <div className="results">
                <div className="res-body" style={{paddingTop:16}}>
                  <div className="res-sect"><span>Costos Operativos</span><span>{fc(cur,project.totalOperativos)}</span></div>

                <div className="fg">
                  <label>Resultado esperado neto ({qForm.moneda})</label>
                  <div className="pfx"><span className="pfx-tag">{qForm.moneda}</span><input type="number" value={resultadoEsperado} onChange={e=>setResultadoEsperado(e.target.value)} /></div>
                </div>
              </div>

              <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
                <button className="btn-dark" onClick={recalcular}
                  disabled={!qForm.costoStand||!resultadoEsperado||!qTravel.flight||n<=0}>
                  ◆ RECALCULAR
                </button>
              </div>

              {qResult && (
                <div className="results">
                  <div className="res-body" style={{paddingTop:16}}>
                    <div className="res-sect"><span>Costos Operativos</span><span>{fc(qResult.moneda,qResult.totalOperativos)}</span></div>
                    <div className="res-sect"><span>Representación{qResult.divisor>1?` (÷${qResult.divisor})`:""}</span><span>{fc(qResult.moneda,qResult.totalRepresentacion)}</span></div>
                    <div className="res-sect"><span>Admin + IRAE</span><span>{fc(qResult.moneda,qResult.gastosAdmin+qResult.irae)}</span></div>
                    <div className="res-neto"><span>Resultado Neto</span><span className="res-amt pos">{fc(qResult.moneda,qResult.neto)}</span></div>
                  </div>
                  <div className="big-box" style={{margin:"0 24px 16px"}}>
                    <div className="big-lbl">Nuevo Ingreso a Cotizar</div>
                    <div className="big-val" style={{fontSize:36}}>{fc(qResult.moneda,qResult.ingresos)}</div>
                    <div className="big-sub">Diferencia vs anterior: {qResult.ingresos>project.ingresos?"+":""}
                      {fc(qResult.moneda,qResult.ingresos-(project.ingresos||0))}
                    </div>
                  </div>
                </div>
              )}
            </>
          )}

        </div>

        <div className="modal-footer">
          {!confirm
            ? <button className="btn-danger" onClick={()=>setConfirm(true)}>Eliminar proyecto</button>
            : <button className="btn-danger" onClick={()=>{ onDelete(project.id); onClose(); }}>¿Confirmar?</button>
          }
          <button className="btn-ghost" onClick={onClose}>Cerrar</button>
          {mode==="edit-stage" && (
            <button className="btn-dark" onClick={saveStage} disabled={saving}>
              {saving?"Guardando...":"Guardar Etapa"}
            </button>
          )}
          {mode==="edit-quote" && qResult && (
            <button className="btn-dark" onClick={saveQuote} disabled={saving}>
              {saving?"Guardando...":"Guardar Cotización"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   PROJECTS LIST VIEW
══════════════════════════════════════════════ */
function ProjectsList({ projects, onUpdate, onDelete }) {
  const [selected, setSelected] = useState(null);
  const [filter, setFilter] = useState("todos");
  const [search, setSearch] = useState("");

  const filtered = projects.filter(p => {
    const matchStage = filter==="todos"||p.etapa===filter;
    const matchSearch = !search || p.proyecto?.toLowerCase().includes(search.toLowerCase()) ||
      p.feria?.toLowerCase().includes(search.toLowerCase()) || p.destino?.toLowerCase().includes(search.toLowerCase());
    return matchStage && matchSearch;
  });

  return (
    <div className="page-wide">
      {/* Filters */}
      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
        <input placeholder="Buscar proyecto, feria, destino..." value={search}
          onChange={e=>setSearch(e.target.value)}
          style={{flex:"1",minWidth:200,maxWidth:340}} />
        <select value={filter} onChange={e=>setFilter(e.target.value)} style={{width:"auto",minWidth:160}}>
          <option value="todos">Todas las etapas</option>
          {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
          <option value="perdido">Perdido</option>
        </select>
      </div>

      {filtered.length===0 ? (
        <div className="empty">
          <div className="empty-icon">📁</div>
          <div className="empty-title">Sin proyectos</div>
          <div className="empty-sub">Ajustá el filtro o creá un nuevo proyecto</div>
        </div>
      ) : (
        <div className="card">
          <div className="card-body" style={{padding:0}}>
            <table className="proj-table">
              <thead>
                <tr>
                  <th>Proyecto</th>
                  <th>Feria / Destino</th>
                  <th>Etapa</th>
                  <th>Ingreso</th>
                  <th>Neto</th>
                  <th>Fechas</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(p=>(
                  <tr key={p.id} style={{cursor:"pointer"}} onClick={()=>setSelected(p)}>
                    <td>
                      <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:13}}>{p.proyecto}</div>
                      <div style={{fontSize:11,color:"#818181"}}>{p.cliente}</div>
                    </td>
                    <td>
                      <div style={{fontWeight:500}}>{p.feria}</div>
                      <div style={{fontSize:11,color:"#818181"}}>{p.destino}</div>
                    </td>
                    <td><span className={`badge ${STAGE_BADGE[p.etapa]||""}`}>{STAGES.find(s=>s.id===p.etapa)?.label||p.etapa}</span></td>
                    <td style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600}}>{fc(p.moneda,p.ingresos)}</td>
                    <td style={{color:"#2ecc71",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600}}>{fc(p.moneda,p.neto)}</td>
                    <td style={{fontSize:11,color:"#818181"}}>{p.llegada||"—"}<br/>{p.partida||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {selected && (
        <ProjectModal
          project={selected}
          onClose={()=>setSelected(null)}
          onUpdate={async(id,data)=>{ await onUpdate(id,data); setSelected(p=>({...p,...data})); }}
          onDelete={onDelete}
          allProjects={projects}
        />
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════ */
function App() {
  const { user, loading, login, logout } = useAuth();
  const { projects, addProject, updateProject, deleteProject, fbMode } = useProjects();
  const [tab, setTab] = useState("dashboard");

  if(loading) return (
    <div style={{minHeight:"100vh",background:"#262626",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:18,letterSpacing:6,color:"#e5e3e0"}}>GALERIE</div>
    </div>
  );

  if(!user) return <LoginScreen onLogin={login} />;

  const handleSaveProject = async (data) => {
    await addProject(data);
    setTab("proyectos");
  };

  const tabs = [
    { id:"dashboard",   label:"Dashboard",          dot:"#f39c12" },
    { id:"proyectos",   label:"Proyectos",           dot:"#3498db" },
    { id:"presupuesto", label:"Nueva Cotización",    dot:"#2ecc71" },
  ];

  return (
    <>
      <div className="sticky-shell">
        <header className="hdr">
          <div className="hdr-logo" onClick={()=>setTab("dashboard")}>GALERIE</div>
          <div className="hdr-right">
            {!fbMode && <div className="hdr-pill">MODO DEMO</div>}
            <div className="hdr-user">{user.email}</div>
            <button className="btn-logout" onClick={logout}>Salir</button>
          </div>
        </header>

        <nav className="nav">
          {tabs.map(t=>(
            <div key={t.id} className={`nav-item${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
              <div className="nav-dot" style={{background:tab===t.id?t.dot:"#3a3a3a"}}></div>
              {t.label}
            </div>
          ))}
        </nav>
      </div>

      {/* Hero */}
      <div className="hero">
        <div className="hero-ey">Galerie — Gestión de Proyectos</div>
        <h1 className="hero-title">
          {tab==="dashboard"   && "Dashboard General"}
          {tab==="proyectos"   && "Proyectos"}
          {tab==="presupuesto" && "Nueva Cotización de Feria"}
        </h1>
        <div className="hero-sub">
          {tab==="dashboard"   && `${projects.filter(p=>!["completado","perdido"].includes(p.etapa)).length} proyectos activos · ${projects.filter(p=>p.etapa==="completado").length} completados`}
          {tab==="proyectos"   && `${projects.length} proyectos registrados`}
          {tab==="presupuesto" && "Desde Montevideo al mundo · Uso interno Galerie"}
        </div>
      </div>

      {tab==="dashboard"   && <Dashboard projects={projects} />}
      {tab==="proyectos"   && <ProjectsList projects={projects} onUpdate={updateProject} onDelete={deleteProject} />}
      {tab==="presupuesto" && (
        <div className="page">
          <BudgetCalc
            onSave={handleSaveProject}
            companyClients={projects.filter(p=>!["perdido"].includes(p.etapa))}
          />
        </div>
      )}

      <footer className="footer">
        <div className="footer-logo">GALERIE</div>
        <div className="footer-info">galerie-expo.com · Sistema de Gestión Interno{fbMode?" · Firebase conectado":""}</div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
