  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #f0eeeb; font-family: 'Poppins', sans-serif; font-weight: 300; color: #262626; min-height: 100vh; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #f0eeeb; } ::-webkit-scrollbar-thumb { background: #b1ada2; }

    /* STICKY SHELL */
    .sticky-shell { position: sticky; top: 0; z-index: 200; }
    .hdr { background: #262626; height: 60px; padding: 0 36px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #b1ada2; }
    .hdr-logo { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: 6px; color: #e5e3e0; text-transform: uppercase; cursor: pointer; }
    .hdr-right { display: flex; align-items: center; gap: 14px; }
    .hdr-pill { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #b1ada2; border: 1px solid #b1ada244; padding: 4px 12px; }
    .hdr-user { font-size: 10px; color: #818181; }
    .btn-logout { background: transparent; border: 1px solid #3a3a3a; color: #818181; padding: 5px 12px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: 'Poppins', sans-serif; transition: all .15s; }
    .btn-logout:hover { border-color: #818181; color: #e5e3e0; }
    .nav { background: #1e1e1e; border-bottom: 1px solid #2a2a2a; display: flex; overflow-x: auto; }
    .nav-item { padding: 0 24px; height: 42px; display: flex; align-items: center; gap: 7px; font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: #818181; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; font-family: 'Poppins', sans-serif; }
    .nav-item:hover { color: #b1ada2; }
    .nav-item.active { color: #e5e3e0; border-bottom-color: #b1ada2; }
    .nav-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* LOGIN */
    .login-wrap { min-height: 100vh; background: #262626; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 360px; }
    .login-logo { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 26px; letter-spacing: 8px; color: #e5e3e0; text-align: center; margin-bottom: 6px; }
    .login-sub { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #818181; text-align: center; margin-bottom: 44px; }
    .login-field { margin-bottom: 12px; }
    .login-label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: #818181; display: block; margin-bottom: 5px; }
    .login-input { width: 100%; background: #1a1a1a; border: 1px solid #3a3a3a; color: #e5e3e0; padding: 12px 14px; font-family: 'Poppins', sans-serif; font-size: 13px; outline: none; border-radius: 0; }
    .login-input:focus { border-color: #b1ada2; }
    .login-btn { width: 100%; background: #e5e3e0; color: #262626; border: none; padding: 15px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: opacity .15s; }
    .login-btn:hover { opacity: .88; }
    .login-error { background: #3a1a1a; border: 1px solid #e74c3c44; color: #e74c3c; padding: 10px 14px; font-size: 11px; margin-top: 10px; text-align: center; }

    /* LAYOUT */
    .page { max-width: 1060px; margin: 0 auto; padding: 28px 20px 80px; }
    .page-wide { max-width: 1280px; margin: 0 auto; padding: 28px 20px 80px; }
    .hero { background: #262626; padding: 32px 36px 26px; }
    .hero-ey { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: #b1ada2; margin-bottom: 6px; }
    .hero-title { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 28px; color: #e5e3e0; line-height: 1.1; }
    .hero-sub { font-size: 11px; color: #818181; margin-top: 6px; }

    /* CARDS */
    .card { background: #fff; border: 1px solid #e5e3e0; margin-bottom: 14px; }
    .card-hdr { background: #f0eeeb; padding: 13px 22px; border-bottom: 1px solid #e5e3e0; display: flex; align-items: center; justify-content: space-between; }
    .card-hdr-left { display: flex; align-items: center; gap: 12px; }
    .step { width: 24px; height: 24px; background: #262626; color: #e5e3e0; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-title { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: #262626; }
    .card-body { padding: 20px 22px; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
    .stat-card { background: #fff; border: 1px solid #e5e3e0; padding: 18px 20px; }
    .stat-lbl { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: #818181; margin-bottom: 8px; }
    .stat-val { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 26px; color: #262626; line-height: 1; }
    .stat-sub { font-size: 10px; color: #b1ada2; margin-top: 5px; }
    .stat-card.dark { background: #262626; } .stat-card.dark .stat-lbl { color: #818181; } .stat-card.dark .stat-val { color: #e5e3e0; } .stat-card.dark .stat-sub { color: #818181; }
    .stat-card.green { border-left: 3px solid #2ecc71; }
    .stat-card.gold { border-left: 3px solid #f39c12; }
    .stat-card.red { border-left: 3px solid #e74c3c; }

    /* FERIA CARDS */
    .feria-card { background: #fff; border: 1px solid #e5e3e0; margin-bottom: 12px; overflow: hidden; }
    .feria-hdr { background: #262626; padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; }
    .feria-name { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 14px; color: #e5e3e0; }
    .feria-meta { font-size: 10px; color: #818181; margin-top: 2px; }
    .feria-stats { display: flex; gap: 18px; align-items: center; }
    .feria-stat { text-align: right; }
    .feria-stat-lbl { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #818181; }
    .feria-stat-val { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 13px; color: #e5e3e0; }
    .feria-body { padding: 14px 22px; }
    .clients-list { display: flex; flex-direction: column; gap: 7px; }
    .client-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 13px; background: #f0eeeb; border: 1px solid #e5e3e0; }
    .client-name-big { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 12px; }
    .client-meta { font-size: 10px; color: #818181; margin-top: 2px; }
    .client-amount { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 13px; }
    .client-profit { font-size: 10px; color: #2ecc71; text-align: right; }
    .saving-badge { background: #f39c1222; border: 1px solid #f39c1244; color: #f39c12; font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 9px; }

    /* PIPELINE */
    .pipeline { display: flex; gap: 0; margin-bottom: 22px; overflow-x: auto; }
    .pipe-stage { flex: 1; min-width: 110px; border: 1px solid #e5e3e0; border-right: none; background: #fff; padding: 12px 14px; position: relative; }
    .pipe-stage:last-child { border-right: 1px solid #e5e3e0; }
    .pipe-stage::after { content:'›'; position:absolute; right:-9px; top:50%; transform:translateY(-50%); font-size:14px; color:#b1ada2; z-index:1; }
    .pipe-stage:last-child::after { display:none; }
    .pipe-lbl { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #818181; margin-bottom: 4px; }
    .pipe-count { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 22px; color: #262626; }
    .pipe-sub { font-size: 9px; color: #b1ada2; margin-top: 2px; }

    /* TABLE */
    .tbl { width: 100%; border-collapse: collapse; }
    .tbl th { background: #f0eeeb; padding: 9px 13px; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #818181; text-align: left; border-bottom: 1px solid #e5e3e0; font-family: 'Poppins', sans-serif; font-weight: 500; }
    .tbl td { padding: 11px 13px; border-bottom: 1px solid #f0eeeb; font-size: 12px; }
    .tbl tr:hover td { background: #fafaf9; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl-actions { display: flex; gap: 6px; }

    /* BADGES */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; font-family: 'Poppins', sans-serif; border: 1px solid; white-space: nowrap; }
    .badge-exploracion { background:#f0eeeb; border-color:#b1ada2; color:#818181; }
    .badge-contacto { background:#fff8e6; border-color:#f39c1266; color:#f39c12; }
    .badge-diseno { background:#e6f0ff; border-color:#3498db44; color:#3498db; }
    .badge-cotizacion { background:#f0e6ff; border-color:#9b59b644; color:#9b59b6; }
    .badge-negociacion { background:#fff3e6; border-color:#e67e2244; color:#e67e22; }
    .badge-aceptado { background:#e6ffe6; border-color:#2ecc7144; color:#2ecc71; }
    .badge-produccion { background:#fff3e6; border-color:#e67e2244; color:#e67e22; }
    .badge-completado { background:#262626; border-color:#262626; color:#e5e3e0; }
    .badge-perdido { background:#ffe6e6; border-color:#e74c3c44; color:#e74c3c; }

    /* STAGE TRACKER */
    .stage-track { display: flex; align-items: center; overflow-x: auto; padding-bottom: 4px; }
    .stage-item { flex: 1; min-width: 70px; display: flex; flex-direction: column; align-items: center; gap: 5px; position: relative; cursor: pointer; }
    .stage-item::after { content:''; position:absolute; top:10px; left:calc(50% + 11px); right:calc(-50% + 11px); height:2px; background:#e5e3e0; z-index:0; }
    .stage-item:last-child::after { display:none; }
    .stage-dot { width:20px; height:20px; border-radius:50%; border:2px solid #e5e3e0; background:#fff; z-index:1; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; transition:all .2s; flex-shrink:0; }
    .stage-dot.done { background:#2ecc71; border-color:#2ecc71; color:#fff; }
    .stage-dot.current { background:#262626; border-color:#262626; color:#fff; }
    .stage-dot.failed { background:#e74c3c; border-color:#e74c3c; color:#fff; }
    .stage-lbl { font-size: 7px; letter-spacing: 1px; text-transform: uppercase; color: #818181; text-align: center; }
    .stage-item.done .stage-lbl { color:#2ecc71; }
    .stage-item.current .stage-lbl { color:#262626; font-weight:600; }

    /* FORMS */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .g4 { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 12px; }
    .fg { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: #818181; font-weight: 500; font-family: 'Poppins', sans-serif; }
    input, select, textarea { font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 400; color: #262626; background: #f0eeeb; border: 1px solid #e5e3e0; padding: 9px 12px; width: 100%; outline: none; transition: border-color .15s, background .15s; -webkit-appearance: none; appearance: none; border-radius: 0; }
    input:focus, select:focus, textarea:focus { border-color: #818181; background: #fff; }
    textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
    .pfx { display:flex; } .pfx-tag { background:#e5e3e0; border:1px solid #e5e3e0; border-right:none; padding:9px 11px; font-size:10px; color:#818181; display:flex; align-items:center; white-space:nowrap; font-family:'Poppins',sans-serif; flex-shrink:0; } .pfx input { border-left:none; }
    .sfx { display:flex; } .sfx input { border-right:none; } .sfx-tag { background:#e5e3e0; border:1px solid #e5e3e0; border-left:none; padding:9px 11px; font-size:10px; color:#818181; display:flex; align-items:center; font-family:'Poppins',sans-serif; }
    .hint { font-size: 10px; color: #b1ada2; font-style: italic; margin-top: 2px; }
    .subtotal { font-size: 11px; color: #818181; font-style: italic; margin-top: 8px; }
    .subtotal strong { color: #262626; font-style: normal; font-weight: 500; }

    /* AUTOCOMPLETE */
    .autocomplete-wrap { position: relative; }
    .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #e5e3e0; border-top: none; z-index: 100; max-height: 200px; overflow-y: auto; }
    .autocomplete-item { padding: 9px 13px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #f0eeeb; transition: background .1s; }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: #f0eeeb; }
    .autocomplete-item-sub { font-size: 10px; color: #818181; margin-top: 2px; }

    /* BUTTONS */
    .btn-dark { background:#262626; color:#e5e3e0; border:none; padding:10px 22px; font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:9px; letter-spacing:3px; text-transform:uppercase; cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:background .15s; }
    .btn-dark:hover { background:#1a1a1a; }
    .btn-dark:disabled { background:#b1ada2; cursor:not-allowed; }
    .btn-warm { background:#b1ada2; color:#fff; border:none; padding:10px 20px; font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:9px; letter-spacing:3px; text-transform:uppercase; cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:opacity .15s; }
    .btn-warm:hover { opacity:.85; }
    .btn-ghost { background:transparent; color:#818181; border:1px solid #e5e3e0; padding:9px 16px; font-family:'Poppins',sans-serif; font-size:9px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:border-color .15s; }
    .btn-ghost:hover { border-color:#818181; color:#262626; }
    .btn-danger { background:#e74c3c22; color:#e74c3c; border:1px solid #e74c3c44; padding:8px 14px; font-family:'Poppins',sans-serif; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:all .15s; }
    .btn-danger:hover { background:#e74c3c; color:#fff; }
    .btn-sm { padding:6px 12px !important; font-size:8px !important; }

    /* MODAL */
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal { background:#fff; width:100%; max-width:740px; max-height:92vh; overflow-y:auto; }
    .modal-hdr { background:#262626; padding:18px 26px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
    .modal-title { font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:13px; color:#e5e3e0; letter-spacing:2px; text-transform:uppercase; }
    .modal-sub { font-size:10px; color:#818181; margin-top:2px; }
    .modal-close { background:none; border:none; color:#818181; font-size:18px; cursor:pointer; padding:0 4px; line-height:1; }
    .modal-close:hover { color:#e5e3e0; }
    .modal-tabs { background:#1e1e1e; display:flex; border-bottom:1px solid #2a2a2a; }
    .modal-tab { padding:9px 18px; font-size:8px; letter-spacing:2px; text-transform:uppercase; font-family:'Poppins',sans-serif; cursor:pointer; color:#818181; border-bottom:2px solid transparent; transition:all .15s; }
    .modal-tab.active { color:#e5e3e0; border-bottom-color:#b1ada2; }
    .modal-body { padding:24px; }
    .modal-footer { padding:14px 24px; border-top:1px solid #e5e3e0; display:flex; gap:10px; justify-content:flex-end; background:#f0eeeb; }

    /* RESULTS */
    .results { background:#262626; color:#e5e3e0; }
    .res-top { padding:24px 32px 18px; border-bottom:1px solid #3a3a3a; }
    .res-ey { font-size:9px; letter-spacing:4px; text-transform:uppercase; color:#b1ada2; margin-bottom:5px; }
    .res-title { font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:18px; line-height:1.3; }
    .res-sub { font-size:11px; color:#818181; margin-top:3px; }
    .res-body { padding:0 32px 24px; }
    .res-sect { display:flex; justify-content:space-between; align-items:center; padding:12px 0 5px; border-bottom:1px solid #3a3a3a; font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:8px; letter-spacing:2.5px; text-transform:uppercase; color:#b1ada2; }
    .res-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid #2a2a2a; font-size:11px; }
    .res-row.ind { padding-left:14px; color:rgba(255,255,255,.45); font-size:10px; }
    .res-amt { font-family:'Plus Jakarta Sans',sans-serif; font-weight:500; font-size:12px; }
    .res-amt.neg { color:#e74c3c; }
    .res-amt.pos { color:#2ecc71; }
    .res-amt.gold { color:#f39c12; }
    .res-neto { display:flex; justify-content:space-between; align-items:center; padding:9px 0; margin-top:6px; }
    .res-neto span:first-child { font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:#e5e3e0; }
    .big-box { margin:0 32px 22px; border:1px solid #3a3a3a; padding:24px; text-align:center; position:relative; overflow:hidden; }
    .big-box::before { content:'GALERIE'; position:absolute; font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:72px; letter-spacing:10px; color:rgba(255,255,255,.025); top:50%; left:50%; transform:translate(-50%,-50%); white-space:nowrap; pointer-events:none; }
    .big-lbl { font-size:8px; letter-spacing:4px; text-transform:uppercase; color:#b1ada2; font-family:'Poppins',sans-serif; margin-bottom:7px; }
    .big-val { font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:46px; color:#e5e3e0; line-height:1; letter-spacing:-1px; }
    .big-sub { font-size:10px; color:#818181; margin-top:5px; }
    .res-tags { display:flex; gap:7px; flex-wrap:wrap; padding:0 32px 18px; }
    .tag { background:rgba(255,255,255,.06); border:1px solid #3a3a3a; color:#b1ada2; font-family:'Poppins',sans-serif; font-size:9px; letter-spacing:1px; padding:3px 10px; }
    .res-actions { padding:14px 32px 24px; border-top:1px solid #2a2a2a; display:flex; gap:10px; flex-wrap:wrap; }
    .btn-ghost-inv { background:transparent; color:rgba(255,255,255,.5); border:1px solid #3a3a3a; padding:10px 18px; font-family:'Poppins',sans-serif; font-size:9px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
    .btn-ghost-inv:hover { border-color:#818181; color:#e5e3e0; }

    /* TRAVEL BADGES */
    .tbadges { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:16px; }
    .tbadge { border:1px solid #e5e3e0; padding:12px 14px; background:#f0eeeb; }
    .tb-lbl { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:#818181; font-family:'Poppins',sans-serif; margin-bottom:5px; }

function getDef(city) {
  const l=(city||"").toLowerCase().trim();
  let entry=null;
  for(const[k,v] of Object.entries(CITY_MAP)){if(l===k){entry=v;break;}}
  if(!entry){for(const[k,v] of Object.entries(CITY_MAP)){if(l.includes(k)||k.includes(l)){entry=v;break;}}}
  if(!entry) entry={r:"default",dF:0,dH:0,dD:0};
  const base=REGION_BASE[entry.r]||REGION_BASE.default;
  return {f:Math.round((base.f+(entry.dF||0))*FERIA_FACTOR),h:Math.round(base.h+(entry.dH||0)),d:Math.round(base.d+(entry.dD||0))};
}
function rooms(pax){return pax<=2?1:pax<=4?2:3;}
function nightsBetween(d1,d2){if(!d1||!d2)return 0;const diff=Math.round((new Date(d2)-new Date(d1))/86400000);return diff>0?diff:0;}

/* ── FIREBASE HOOKS ── */
function useCollection(colName) {
  const [data, setData] = useState([]);
  const [fbMode, setFbMode] = useState(false);
  const fb = window.__fb;

  useEffect(()=>{
    if(!fb?.db) return;
    try {
      const {collection,query,orderBy,onSnapshot}=fb;
      const q=query(collection(fb.db,colName),orderBy("updatedAt","desc"));
      const unsub=onSnapshot(q,snap=>{
        setData(snap.docs.map(d=>({id:d.id,...d.data(),
          createdAt:d.data().createdAt?.toDate?.()??new Date(),
          updatedAt:d.data().updatedAt?.toDate?.()??new Date()
        })));
        setFbMode(true);
      },()=>{});
      return unsub;
    }catch(e){}
  },[colName]);

  const add = async(doc) => {
    if(fb?.db){
      const{collection,addDoc,serverTimestamp}=fb;
      await addDoc(collection(fb.db,colName),{...doc,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
    } else setData(p=>[{id:"local_"+Date.now(),...doc,createdAt:new Date(),updatedAt:new Date()},...p]);
  };
  const update = async(id,doc) => {
    if(fb?.db){const{doc:d,updateDoc,serverTimestamp}=fb;await updateDoc(d(fb.db,colName,id),{...doc,updatedAt:serverTimestamp()});}
    else setData(p=>p.map(x=>x.id===id?{...x,...doc,updatedAt:new Date()}:x));
  };
  const remove = async(id) => {
    if(fb?.db){const{doc:d,deleteDoc}=fb;await deleteDoc(d(fb.db,colName,id));}
    else setData(p=>p.filter(x=>x.id!==id));
  };
  return {data,fbMode,add,update,remove};
}

function useAuth() {
  const [user,setUser]=useState(null);

    return fb.onAuthStateChanged(fb.auth,u=>{setUser(u);setLoading(false);});
  },[]);
  const login=async(email,pass)=>{
    if(!fb?.auth){
      if(email==="info@galerie-expo.com"&&pass==="Galerie270925")setUser({email});
      else throw new Error("Credenciales incorrectas");return;
    }
    await fb.signInWithEmailAndPassword(fb.auth,email,pass);
  };
  const logout=async()=>{if(!fb?.auth){setUser(null);return;}await fb.signOut(fb.auth);};
  return{user,loading,login,logout};
}

/* ── STAGE TRACKER ── */
function StageTracker({currentStage,onStageClick}){
  const idx=STAGES.findIndex(s=>s.id===currentStage);
  const isLost=currentStage==="perdido";
  return(
    <div className="stage-track">
      {STAGES.map((s,i)=>{
        const done=!isLost&&i<idx,curr=!isLost&&s.id===currentStage;
        const cls=done?"done":curr?"current":"";
        return(
          <div key={s.id} className={`stage-item ${cls}`} onClick={()=>onStageClick&&onStageClick(s.id)}>
            <div className={`stage-dot ${cls}`}>{done?"✓":i+1}</div>
            <div className="stage-lbl">{s.label}</div>
          </div>
        );
      })}
      {isLost&&<div className="stage-item failed"><div className="stage-dot failed">✕</div><div className="stage-lbl" style={{color:"#e74c3c"}}>Perdido</div></div>}
    </div>
  );
}

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const n=nightsBetween(form.llegada,form.partida);
  const pax=parseInt(form.personas)||1;
  const m2=parseFloat(form.m2)||0;

  // Only count projects in ACCEPTED_STAGES for cost sharing
  const sameFeraAccepted=allProjects.filter(p=>
    p.feria===form.feria&&
    p.destino?.toLowerCase()===form.destino?.toLowerCase()&&
    ACCEPTED_STAGES.includes(p.etapa)&&
    p.id!==initialData.id
  );
  const divisor=ACCEPTED_STAGES.includes(form.etapa)?sameFeraAccepted.length+1:1;

  const onDestinoBlur=()=>{
    if(!form.destino)return;
    const d=getDef(form.destino);
    setTravel({flight:String(d.f),hotel:String(d.h),daily:String(d.d)});
  };

  const selectCliente=(c)=>{
    if(!c){set("clienteId","");set("clienteNombre","");return;}
    set("clienteId",c.id);set("clienteNombre",c.empresa);
    if(!form.proyecto)set("proyecto",c.empresa);

  const selectFeria=(f)=>{

      const d=getDef(f.ciudad);
      setTravel({flight:String(d.f),hotel:String(d.h),daily:String(d.d)});
    }
    if(f.fechaInicio)set("llegada",f.fechaInicio);
    if(f.fechaFin)set("partida",f.fechaFin);
  };

  const calcular=()=>{
    const cs=parseFloat(form.costoStand)||0;
    const cc=parseFloat(form.costoCatering)||0;
    const cv=parseFloat(form.costoServicios)||0;
    const top=cs+cc+cv;
    const ft=(parseFloat(travel.flight)||0)*pax/divisor;
    const ht=(parseFloat(travel.hotel)||0)*n*rooms(pax)/divisor;
    const dt=(parseFloat(travel.daily)||0)*n*pax/divisor;
    const trep=ft+ht+dt;
    const pct=(parseFloat(form.gastosAdminPct)/100)||0.05;
    const neto=parseFloat(form.resultadoEsperado)||0;
    const costos=top+trep;
    const rb=neto/0.75;
    const ingresos=costos+rb/(1-pct);
    const ga=(ingresos-costos)*pct;
    const rbc=ingresos-costos-ga;
    const irae=rbc*0.25;
    const costoViajeFull=(parseFloat(travel.flight)||0)*pax+(parseFloat(travel.hotel)||0)*n*rooms(pax)+(parseFloat(travel.daily)||0)*n*pax;
    setResult({
      ingresos,costoStand:cs,costoCatering:cc,costoServicios:cv,totalOperativos:top,
      flightTotal:ft,hotelTotal:ht,dailyTotal:dt,totalRepresentacion:trep,
      flightCostPax:parseFloat(travel.flight)||0,hotelCostNight:parseFloat(travel.hotel)||0,dailyCostPax:parseFloat(travel.daily)||0,
      gastosAdminPct:pct,gastosAdmin:ga,rentaBruta:rbc,irae,neto:rbc-irae,
      moneda:form.moneda,personas:pax,nights:n,divisor,costoViajeFull,
      m2,costoM2:m2>0?cs/m2:0,
    });
    setTimeout(()=>resRef.current?.scrollIntoView({behavior:"smooth"}),100);
  };

  const canCalc=form.costoStand&&form.resultadoEsperado&&travel.flight&&travel.hotel&&travel.daily&&n>0;

  const handleSave=()=>{
    if(!result||!onSave)return;
    onSave({...form,personas:pax,gastosAdminPct:result.gastosAdminPct,
      ingresos:result.ingresos,costoStand:result.costoStand,costoCatering:result.costoCatering,
      costoServicios:result.costoServicios,flightTotal:result.flightTotal,hotelTotal:result.hotelTotal,
      dailyTotal:result.dailyTotal,flightCostPax:result.flightCostPax,hotelCostNight:result.hotelCostNight,
      dailyCostPax:result.dailyCostPax,gastosAdmin:result.gastosAdmin,rentaBruta:result.rentaBruta,
      irae:result.irae,neto:result.neto,totalRepresentacion:result.totalRepresentacion,
      totalOperativos:result.totalOperativos,m2:result.m2,costoM2:result.costoM2,
    });
  };

  return(
    <div>
      {/* 1 — Proyecto */}
      <div className="card">
        <div className="card-hdr"><div className="card-hdr-left"><span className="step">1</span><span className="card-title">Información del Proyecto</span></div></div>
        <div className="card-body">
          <div className="g2" style={{marginBottom:14}}>
            <div className="fg">
              <label>Cliente</label>
              <ClientSearch clients={clients} value={form.clienteNombre} onSelect={selectCliente} placeholder="Buscar cliente registrado..." />
              {form.clienteId&&<span className="hint">✓ Cliente vinculado</span>}
            </div>
            <div className="fg"><label>Nombre del Proyecto</label><input placeholder="ej. BILBOSA — Seafood 2026" value={form.proyecto} onChange={e=>set("proyecto",e.target.value)} /></div>
            <div className="fg">
              <label>Feria</label>
              <FeriaSearch ferias={ferias} value={form.feria} onSelect={selectFeria} placeholder="Buscar feria registrada..." />
              {!form.feriaId&&<span className="hint">O escribí el nombre manualmente</span>}
            </div>
            <div className="fg">
              <label>Moneda</label>
              <select value={form.moneda} onChange={e=>set("moneda",e.target.value)}>
                <option value="USD">USD — Dólar</option><option value="EUR">EUR — Euro</option><option value="UYU">UYU — Peso</option>
              </select>
            </div>
            <div className="fg">
              <label>Etapa</label>
              <select value={form.etapa} onChange={e=>set("etapa",e.target.value)}>
                {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
                <option value="perdido">Perdido</option>
              </select>
            </div>
            {onSave&&<div className="fg"><label>Packlist / Observaciones del Stand</label><textarea value={form.notas} onChange={e=>set("notas",e.target.value)} rows={3} placeholder="Ej: 2 sillas, 1 barra, mesa de reunión, folletería, pantalla LED..." /></div>}
          </div>
          {sameFeraAccepted.length>0&&ACCEPTED_STAGES.includes(form.etapa)&&(
            <div className="note-box savings">
              <strong>⚡ Licuación de Costos</strong>
              {sameFeraAccepted.length} proyecto{sameFeraAccepted.length>1?"s aceptados":"aceptado"} más en {form.feria}: {sameFeraAccepted.map(p=>p.proyecto).join(", ")}. Los costos de viaje se dividirán en {divisor} partes.
            </div>
          )}
        </div>
      </div>

      {/* 2 — Costos */}
      <div className="card">
        <div className="card-hdr"><div className="card-hdr-left"><span className="step">2</span><span className="card-title">Costos Operativos del Stand</span></div></div>
        <div className="card-body">
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:12,marginBottom:12}}>
            <div className="fg">
              <label>Stand / Montaje</label>
              <div className="pfx"><span className="pfx-tag">{form.moneda}</span><input type="number" placeholder="0" value={form.costoStand} onChange={e=>set("costoStand",e.target.value)} /></div>
            </div>
            <div className="fg">
              <label>Superficie (m²)</label>
              <div className="sfx"><input type="number" placeholder="0" value={form.m2} onChange={e=>set("m2",e.target.value)} /><span className="sfx-tag">m²</span></div>
            </div>
            <div className="fg">
              <label>Catering</label>
              <div className="pfx"><span className="pfx-tag">{form.moneda}</span><input type="number" placeholder="0" value={form.costoCatering} onChange={e=>set("costoCatering",e.target.value)} /></div>
            </div>
            <div className="fg">
              <label>Servicios</label>
              <div className="pfx"><span className="pfx-tag">{form.moneda}</span><input type="number" placeholder="0" value={form.costoServicios} onChange={e=>set("costoServicios",e.target.value)} /></div>
            </div>
          </div>
          {form.costoStand&&m2>0&&(
            <div className="note-box"><strong>Costo por m²</strong>
              Stand: {fc(form.moneda,(parseFloat(form.costoStand)||0)/m2)}/m² · Total operativos: {fc(form.moneda,(parseFloat(form.costoStand)||0)+(parseFloat(form.costoCatering)||0)+(parseFloat(form.costoServicios)||0))}
            </div>
          )}
        </div>
      </div>

      {/* 3 — Representación */}
      <div className="card">
        <div className="card-hdr">
          <div className="card-hdr-left"><span className="step">3</span><span className="card-title">Costos de Representación</span></div>
          {divisor>1&&<span className="saving-badge">÷{divisor} proyectos aceptados</span>}
          {divisor===1&&ACCEPTED_STAGES.includes(form.etapa)&&<span style={{fontSize:9,color:"#818181"}}>Solo se divide si hay otros aceptados</span>}
          {!ACCEPTED_STAGES.includes(form.etapa)&&<span style={{fontSize:9,color:"#b1ada2",fontStyle:"italic"}}>Se prorrateará al aceptar el proyecto</span>}
        </div>
        <div className="card-body">
          <div className="g4">
            <div className="fg">
              <label>Ciudad destino</label>
              <input placeholder="ej. Barcelona, Cologne..." value={form.destino} onChange={e=>set("destino",e.target.value)} onBlur={onDestinoBlur} />
            </div>
            <div className="fg">
              <label>Personas</label>
              <select value={form.personas} onChange={e=>set("personas",e.target.value)}>
                {[1,2,3,4,5,6].map(x=><option key={x} value={x}>{x} pax</option>)}
              </select>
            </div>
            <div className="fg"><label>Llegada</label><input type="date" value={form.llegada} onChange={e=>set("llegada",e.target.value)} /></div>
            <div className="fg"><label>Partida</label><input type="date" value={form.partida} onChange={e=>set("partida",e.target.value)} /></div>
          </div>
          {n>0&&<p className="subtotal" style={{marginTop:10}}><strong>{n} noches · {pax} persona{pax>1?"s":""}</strong>{divisor>1&&<span style={{color:"#f39c12"}}> · Viaje ÷{divisor}</span>}</p>}
          <div className="tbadges">
            {[
              {k:"flight",lbl:"Pasaje/pax I+V",sub:"ida y vuelta total"},
              {k:"hotel",lbl:"Hotel/noche/hab",sub:`${rooms(pax)} hab. para ${pax} pax`},
              {k:"daily",lbl:"Viáticos/día/pax",sub:"comida + transporte"},
            ].map(({k,lbl,sub})=>(
              <div className="tbadge" key={k}>
                <div className="tb-lbl">{lbl}</div>
                <div className="pfx" style={{marginTop:5}}>
                  <span className="pfx-tag">{form.moneda}</span>
                  <input type="number" value={travel[k]} onChange={e=>setTravel(t=>({...t,[k]:e.target.value}))} />
                </div>
                <div className="tb-sub">{sub}</div>
              </div>
            ))}
          </div>
          {travel.flight&&divisor>1&&(
            <div className="note-box savings" style={{marginTop:12}}>
              <strong>Ahorro por licuación</strong>
              Costo viaje completo sin compartir: {fc(form.moneda,(parseFloat(travel.flight)||0)*pax+(parseFloat(travel.hotel)||0)*n*rooms(pax)+(parseFloat(travel.daily)||0)*n*pax)}.
              Este proyecto absorbe: {fc(form.moneda,((parseFloat(travel.flight)||0)*pax+(parseFloat(travel.hotel)||0)*n*rooms(pax)+(parseFloat(travel.daily)||0)*n*pax)/divisor)}
            </div>
          )}
        </div>
      </div>

      {/* 4 — Financiero */}
      <div className="card">
        <div className="card-hdr"><div className="card-hdr-left"><span className="step">4</span><span className="card-title">Parámetros Financieros</span></div></div>
        <div className="card-body">
          <div className="g2">
            <div className="fg">
              <label>Gastos Administrativos</label>
              <div className="sfx"><input type="number" step="0.5" min="0" max="100" value={form.gastosAdminPct} onChange={e=>set("gastosAdminPct",e.target.value)} /><span className="sfx-tag">%</span></div>
              <p className="hint">Pre-cargado en 5% — política interna Galerie</p>
            </div>
            <div className="fg">
              <label>Resultado esperado neto ({form.moneda})</label>
              <div className="pfx"><span className="pfx-tag">{form.moneda}</span><input type="number" placeholder="ej. 1500" value={form.resultadoEsperado} onChange={e=>set("resultadoEsperado",e.target.value)} /></div>
              <p className="hint">IRAE Uruguay = 25% sobre renta bruta</p>
            </div>
          </div>
        </div>
      </div>

      <div style={{display:"flex",justifyContent:"center",marginTop:8}}>
        <button className="btn-dark" style={{padding:"14px 44px",fontSize:10,letterSpacing:4}} onClick={calcular} disabled={!canCalc}>
          {canCalc?"◆  CALCULAR PRESUPUESTO":"COMPLETÁ TODOS LOS CAMPOS"}
        </button>
      </div>

      {result&&(
        <div ref={resRef}>
          <div className="div-label"><span>Resultado</span></div>
          <div className="results">
            <div className="res-top">
              <div className="res-ey">Presupuesto calculado</div>
              <div className="res-title">{result.feria||"Feria Internacional"}{result.destino?` — ${result.destino}`:""}</div>
              {result.proyecto&&<div className="res-sub">{result.proyecto}{result.clienteNombre?` · ${result.clienteNombre}`:""}</div>}
              {result.divisor>1&&<div className="res-sub" style={{color:"#f39c12",marginTop:3}}>⚡ Costos de viaje ÷{result.divisor} proyectos aceptados</div>}
            </div>
            <div className="res-body">
              <div className="res-sect"><span>Costos Operativos</span><span>{fc(result.moneda,result.totalOperativos)}</span></div>
              {result.costoStand>0&&<div className="res-row ind"><span>Stand / Montaje{result.m2>0?` (${result.m2}m² · ${fc(result.moneda,result.costoM2)}/m²)`:""}  </span><span className="res-amt">{fc(result.moneda,result.costoStand)}</span></div>}
              {result.costoCatering>0&&<div className="res-row ind"><span>Catering</span><span className="res-amt">{fc(result.moneda,result.costoCatering)}</span></div>}
              {result.costoServicios>0&&<div className="res-row ind"><span>Servicios</span><span className="res-amt">{fc(result.moneda,result.costoServicios)}</span></div>}
              <div className="res-sect"><span>Costos de Representación{result.divisor>1?` (1/${result.divisor} del viaje)`:""}</span><span>{fc(result.moneda,result.totalRepresentacion)}</span></div>
              <div className="res-row ind"><span>Pasajes ({result.personas} pax)</span><span className="res-amt">{fc(result.moneda,result.flightTotal)}</span></div>
              <div className="res-row ind"><span>Hotel ({result.nights} noches × {rooms(result.personas)} hab.)</span><span className="res-amt">{fc(result.moneda,result.hotelTotal)}</span></div>
              <div className="res-row ind"><span>Viáticos ({result.nights} días × {result.personas} pax)</span><span className="res-amt">{fc(result.moneda,result.dailyTotal)}</span></div>
              {result.divisor>1&&<div className="res-row ind" style={{color:"#f39c12"}}><span>Ahorro vs. sin compartir</span><span className="res-amt gold">−{fc(result.moneda,result.costoViajeFull-result.totalRepresentacion)}</span></div>}
              <div className="res-sect"><span>Gastos Admin ({(result.gastosAdminPct*100).toFixed(1)}%)</span><span>{fc(result.moneda,result.gastosAdmin)}</span></div>
              <div className="res-sect"><span>Renta Bruta antes de IRAE</span><span>{fc(result.moneda,result.rentaBruta)}</span></div>
              <div className="res-row ind"><span>IRAE (25%)</span><span className="res-amt neg">({fc(result.moneda,result.irae)})</span></div>
              <div className="res-neto"><span>Resultado Neto después de Impuestos</span><span className="res-amt pos">{fc(result.moneda,result.neto)}</span></div>
            </div>
            <div className="big-box">
              <div className="big-lbl">Ingreso Operativo a Cotizar</div>
              <div className="big-val">{fc(result.moneda,result.ingresos)}</div>
              <div className="big-sub">Valor mínimo a cobrar por el stand{result.m2>0?` · ${fc(result.moneda,result.ingresos/result.m2)}/m²`:""}</div>
            </div>
            <div className="res-tags">
              {result.destino&&<span className="tag">{result.destino}</span>}
              <span className="tag">{result.nights} noches</span>
              <span className="tag">{result.personas} pax</span>
              {result.m2>0&&<span className="tag">{result.m2}m²</span>}
              <span className="tag">IRAE 25%</span>
              <span className="tag">Admin {(result.gastosAdminPct*100).toFixed(0)}%</span>
              <span className="tag">{result.moneda}</span>
              {result.divisor>1&&<span className="tag" style={{borderColor:"#f39c1244",color:"#f39c12"}}>÷{result.divisor} proyectos</span>}
            </div>
            <div className="res-actions">
              {onSave&&<button className="btn-dark" onClick={handleSave}>◆  GUARDAR PROYECTO</button>}
              <button className="btn-ghost-inv" onClick={()=>{setResult(null);window.scrollTo({top:0,behavior:"smooth"});}}>Nuevo cálculo</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── PROJECT MODAL ── */
function ProjectModal({project,onClose,onUpdate,onDelete,allProjects,clients,ferias}){
  const[mode,setMode]=useState("view");
  const[saving,setSaving]=useState(false);
  const[confirm,setConfirm]=useState(false);
  const[newStage,setNewStage]=useState(project.etapa);
  const[notas,setNotas]=useState(project.notas||"");
  const[qResult,setQResult]=useState(null);
  const[qForm,setQForm]=useState({
    proyecto:project.proyecto||"",clienteId:project.clienteId||"",clienteNombre:project.clienteNombre||"",
    feriaId:project.feriaId||"",feria:project.feria||"",destino:project.destino||"",
    llegada:project.llegada||"",partida:project.partida||"",personas:String(project.personas||2),
    m2:String(project.m2||""),costoStand:String(project.costoStand||""),costoCatering:String(project.costoCatering||""),
    costoServicios:String(project.costoServicios||""),moneda:project.moneda||"USD",
    gastosAdminPct:String((project.gastosAdminPct||0.05)*100),
  });
  const[qTravel,setQTravel]=useState({
    flight:String(project.flightCostPax||Math.round((project.flightTotal||0)/(project.personas||2))||""),
    hotel:String(project.hotelCostNight||""),daily:String(project.dailyCostPax||""),
  });
  const[resultadoEsp,setResultadoEsp]=useState(String(project.neto||""));
  const setQ=(k,v)=>setQForm(f=>({...f,[k]:v}));
  const qN=nightsBetween(qForm.llegada,qForm.partida);
  const qPax=parseInt(qForm.personas)||1;
  const sameFeraCount=allProjects.filter(p=>p.feria===project.feria&&p.id!==project.id&&ACCEPTED_STAGES.includes(p.etapa)).length;
  const divisor=ACCEPTED_STAGES.includes(project.etapa)?sameFeraCount+1:1;

  const saveStage=async()=>{setSaving(true);await onUpdate(project.id,{etapa:newStage,notas});setSaving(false);setMode("view");};
  const recalcular=()=>{
    const cs=parseFloat(qForm.costoStand)||0,cc=parseFloat(qForm.costoCatering)||0,cv=parseFloat(qForm.costoServicios)||0,top=cs+cc+cv;
    const qDiv=ACCEPTED_STAGES.includes(qForm.etapa||project.etapa)?sameFeraCount+1:1;
    const ft=(parseFloat(qTravel.flight)||0)*qPax/qDiv,ht=(parseFloat(qTravel.hotel)||0)*qN*rooms(qPax)/qDiv,dt=(parseFloat(qTravel.daily)||0)*qN*qPax/qDiv,trep=ft+ht+dt;
    const pct=(parseFloat(qForm.gastosAdminPct)/100)||0.05,neto=parseFloat(resultadoEsp)||0,costos=top+trep;
    const rb=neto/0.75,ingresos=costos+rb/(1-pct),ga=(ingresos-costos)*pct,rbc=ingresos-costos-ga,irae=rbc*0.25;
    const m2=parseFloat(qForm.m2)||0;
    setQResult({ingresos,costoStand:cs,costoCatering:cc,costoServicios:cv,totalOperativos:top,flightTotal:ft,hotelTotal:ht,dailyTotal:dt,totalRepresentacion:trep,flightCostPax:parseFloat(qTravel.flight)||0,hotelCostNight:parseFloat(qTravel.hotel)||0,dailyCostPax:parseFloat(qTravel.daily)||0,gastosAdminPct:pct,gastosAdmin:ga,rentaBruta:rbc,irae,neto:rbc-irae,moneda:qForm.moneda,m2,costoM2:m2>0?cs/m2:0});
  };
  const saveQuote=async()=>{
    if(!qResult)return;setSaving(true);
    await onUpdate(project.id,{...qForm,personas:qPax,gastosAdminPct:qResult.gastosAdminPct,...qResult,notas});
    setSaving(false);setMode("view");
  };
  const cur=project.moneda;

  return(
    <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:800}}>
        <div className="modal-hdr">
          <div>
            <div className="modal-title">{project.proyecto}</div>
            <div className="modal-sub">{project.feria}{project.destino?` · ${project.destino}`:""}{project.clienteNombre?` · ${project.clienteNombre}`:""}</div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-tabs">
          {[{id:"view",label:"Resumen"},{id:"edit-stage",label:"Etapa"},{id:"edit-quote",label:"Editar Cotización"}].map(t=>(
            <div key={t.id} className={`modal-tab${mode===t.id?" active":""}`} onClick={()=>setMode(t.id)}>{t.label}</div>
          ))}
        </div>
        <div className="modal-body">

          {/* VIEW */}
          {mode==="view"&&(
            <>
              <div style={{marginBottom:20}}>
                <div style={{fontSize:"9px",letterSpacing:"2px",color:"#818181",textTransform:"uppercase",marginBottom:10,fontFamily:"'Poppins',sans-serif"}}>Etapa Actual</div>
                <StageTracker currentStage={project.etapa} />
              </div>
              <div className="g2" style={{marginBottom:18}}>
                <div>
                  <div style={{fontSize:"9px",letterSpacing:"2px",color:"#818181",textTransform:"uppercase",marginBottom:3,fontFamily:"'Poppins',sans-serif"}}>Stand</div>
                  <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700}}>{project.cliente||project.clienteNombre||"—"}</div>
                  <div style={{fontSize:"11px",color:"#818181"}}>{project.llegada||"—"} → {project.partida||"—"} · {project.personas||2} pax{project.m2?` · ${project.m2}m²`:""}</div>
                  {project.m2>0&&project.costoStand>0&&<div style={{fontSize:"11px",color:"#b1ada2",marginTop:2}}>{fc(cur,project.costoStand/project.m2)}/m² de stand</div>}
                </div>
                <div>
                  <div style={{fontSize:"9px",letterSpacing:"2px",color:"#818181",textTransform:"uppercase",marginBottom:3,fontFamily:"'Poppins',sans-serif"}}>Notas / Packlist</div>
                  {project.notas
                    ?<div className="packlist-wrap"><div className="packlist-text">{project.notas}</div></div>
                    :<div style={{fontSize:"12px",color:"#b1ada2",fontStyle:"italic"}}>Sin packlist registrado</div>
                  }
                </div>
              </div>
              {sameFeraCount>0&&ACCEPTED_STAGES.includes(project.etapa)&&(
                <div className="note-box savings" style={{marginBottom:14}}>
                  <strong>⚡ Costos de viaje compartidos</strong>
                  {sameFeraCount} proyecto{sameFeraCount>1?"s aceptados":"aceptado"} más en {project.feria}. Viaje ÷{divisor}.
                </div>
              )}
              <div className="results">
                <div className="res-body" style={{paddingTop:14}}>
                  <div className="res-sect"><span>Costos Operativos</span><span>{fc(cur,project.totalOperativos)}</span></div>
                  {project.costoStand>0&&<div className="res-row ind"><span>Stand{project.m2>0?` (${project.m2}m² · ${fc(cur,project.costoStand/project.m2)}/m²)`:""}  </span><span className="res-amt">{fc(cur,project.costoStand)}</span></div>}
                  {project.costoCatering>0&&<div className="res-row ind"><span>Catering</span><span className="res-amt">{fc(cur,project.costoCatering)}</span></div>}

                  </div>
                </div>
              )}
            </>
          )}

        </div>
      </div>
    </div>
  );
}

/* ── DASHBOARD ── */
function Dashboard({projects,ferias}){
  const active=projects.filter(p=>!["completado","perdido"].includes(p.etapa));
  const completed=projects.filter(p=>p.etapa==="completado");
  const lost=projects.filter(p=>p.etapa==="perdido");
  const revenue=completed.reduce((a,p)=>a+(p.ingresos||0),0);
  const netProfit=completed.reduce((a,p)=>a+(p.neto||0),0);
  const stageCounts={};STAGES.forEach(s=>{stageCounts[s.id]=projects.filter(p=>p.etapa===s.id).length;});

  const byFeria={};
  projects.forEach(p=>{if(!p.feria)return;if(!byFeria[p.feria])byFeria[p.feria]={ps:[],destino:p.destino};byFeria[p.feria].ps.push(p);});
  const feriaData=Object.entries(byFeria).map(([name,{ps,destino}])=>{
    const activos=ps.filter(p=>!["perdido"].includes(p.etapa));
    const aceptados=ps.filter(p=>ACCEPTED_STAGES.includes(p.etapa));
    const totalIngresos=activos.reduce((a,p)=>a+(p.ingresos||0),0);
    const totalNeto=activos.reduce((a,p)=>a+(p.neto||0),0);
    const travelFull=ps[0]?((ps[0].flightCostPax||0)*2*(ps[0].personas||2)+(ps[0].hotelCostNight||0)*nightsBetween(ps[0].llegada,ps[0].partida)*rooms(ps[0].personas||2)+(ps[0].dailyCostPax||0)*nightsBetween(ps[0].llegada,ps[0].partida)*(ps[0].personas||2)):0;
    const travelSaved=aceptados.length>1?travelFull*(aceptados.length-1)/aceptados.length:0;
    return{name,destino,ps:activos,aceptados,totalIngresos,totalNeto,travelSaved};
  }).sort((a,b)=>b.totalIngresos-a.totalIngresos);

  return(
    <div className="page-wide">
      <div className="stats-grid">
        <div className="stat-card dark"><div className="stat-lbl">Activos</div><div className="stat-val">{active.length}</div><div className="stat-sub">{projects.length} proyectos en total</div></div>
        <div className="stat-card green"><div className="stat-lbl">Completados</div><div className="stat-val">{completed.length}</div><div className="stat-sub">Tasa éxito: {projects.length?Math.round(completed.length/projects.length*100):0}%</div></div>
        <div className="stat-card gold"><div className="stat-lbl">Revenue (Completados)</div><div className="stat-val" style={{fontSize:18}}>USD {fmt(revenue)}</div><div className="stat-sub">Neto: USD {fmt(netProfit)}</div></div>
        <div className="stat-card red"><div className="stat-lbl">Perdidos</div><div className="stat-val">{lost.length}</div><div className="stat-sub">{projects.length?Math.round(lost.length/projects.length*100):0}% tasa de pérdida</div></div>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:"9px",letterSpacing:"2.5px",textTransform:"uppercase",color:"#818181",marginBottom:10,fontFamily:"'Poppins',sans-serif"}}>Pipeline</div>
        <div className="pipeline">
          {STAGES.slice(0,6).map(s=>(
            <div key={s.id} className="pipe-stage">
              <div className="pipe-lbl">{s.label}</div>
              <div className="pipe-count">{stageCounts[s.id]||0}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{fontSize:"9px",letterSpacing:"2.5px",textTransform:"uppercase",color:"#818181",marginBottom:10,fontFamily:"'Poppins',sans-serif"}}>Potencial por Feria</div>
      {feriaData.length===0&&<div className="empty"><div className="empty-icon">📊</div><div className="empty-title">Sin datos aún</div><div className="empty-sub">Creá proyectos para ver el análisis por feria</div></div>}
      {feriaData.map(fd=>(
        <div key={fd.name} className="feria-card">
          <div className="feria-hdr">
            <div><div className="feria-name">{fd.name}</div><div className="feria-meta">{fd.destino} · {fd.ps.length} proyecto{fd.ps.length!==1?"s":""}{fd.aceptados.length>0?` · ${fd.aceptados.length} aceptado${fd.aceptados.length>1?"s":""} (viaje compartido)`:""}</div></div>
            <div className="feria-stats">
              {fd.travelSaved>0&&<div className="feria-stat"><div className="feria-stat-lbl">Ahorro viaje</div><div className="feria-stat-val" style={{color:"#f39c12"}}>+USD {fmt(fd.travelSaved)}</div></div>}
              <div className="feria-stat"><div className="feria-stat-lbl">Ingresos</div><div className="feria-stat-val">{fc(fd.ps[0]?.moneda||"USD",fd.totalIngresos)}</div></div>
              <div className="feria-stat"><div className="feria-stat-lbl">Neto</div><div className="feria-stat-val" style={{color:"#2ecc71"}}>{fc(fd.ps[0]?.moneda||"USD",fd.totalNeto)}</div></div>
            </div>
          </div>
          <div className="feria-body">
            <div className="clients-list">
              {fd.ps.map(p=>(
                <div key={p.id} className="client-row">
                  <div>
                    <div className="client-name-big">{p.proyecto}</div>
                    <div className="client-meta">{p.feria&&p.clienteNombre?p.clienteNombre:p.cliente||"—"}{p.m2>0?` · ${p.m2}m²`:""} · <span className={`badge ${STAGE_BADGE[p.etapa]||""}`}>{STAGES.find(s=>s.id===p.etapa)?.label||p.etapa}</span></div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div className="client-amount">{fc(p.moneda,p.ingresos)}</div>
                    {p.m2>0&&p.ingresos>0&&<div style={{fontSize:10,color:"#b1ada2"}}>{fc(p.moneda,p.ingresos/p.m2)}/m²</div>}
                    <div className="client-profit">Neto: {fc(p.moneda,p.neto)}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── PROJECTS LIST ── */
function ProjectsList({projects,onUpdate,onDelete,clients,ferias}){
  const[selected,setSelected]=useState(null);
  const[filter,setFilter]=useState("todos");
  const[search,setSearch]=useState("");
  const filtered=projects.filter(p=>{
    const mS=filter==="todos"||p.etapa===filter;
    const mQ=!search||p.proyecto?.toLowerCase().includes(search.toLowerCase())||p.feria?.toLowerCase().includes(search.toLowerCase())||p.destino?.toLowerCase().includes(search.toLowerCase())||p.clienteNombre?.toLowerCase().includes(search.toLowerCase());
    return mS&&mQ;
  });
  return(
    <div className="page-wide">
      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
        <input placeholder="Buscar proyecto, feria, cliente, destino..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:200,maxWidth:360}} />
        <select value={filter} onChange={e=>setFilter(e.target.value)} style={{width:"auto",minWidth:160}}>
          <option value="todos">Todas las etapas</option>
          {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
          <option value="perdido">Perdido</option>
        </select>
      </div>
      {filtered.length===0
        ?<div className="empty"><div className="empty-icon">📁</div><div className="empty-title">Sin proyectos</div><div className="empty-sub">Ajustá el filtro o creá un nuevo proyecto</div></div>
        :(
          <div className="card"><div className="card-body" style={{padding:0}}>
            <table className="tbl">
              <thead><tr><th>Proyecto</th><th>Cliente</th><th>Feria / Destino</th><th>m²</th><th>Etapa</th><th>Ingreso</th><th>€/m²</th><th>Neto</th></tr></thead>
              <tbody>
                {filtered.map(p=>(
                  <tr key={p.id} style={{cursor:"pointer"}} onClick={()=>setSelected(p)}>
                    <td><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:13}}>{p.proyecto}</div></td>
                    <td style={{fontSize:11,color:"#818181"}}>{p.clienteNombre||p.cliente||"—"}</td>
                    <td><div style={{fontWeight:500,fontSize:12}}>{p.feria}</div><div style={{fontSize:10,color:"#818181"}}>{p.destino}</div></td>
                    <td style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600}}>{p.m2>0?`${p.m2}m²`:"—"}</td>
                    <td><span className={`badge ${STAGE_BADGE[p.etapa]||""}`}>{STAGES.find(s=>s.id===p.etapa)?.label||p.etapa}</span></td>
                    <td style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600,fontSize:12}}>{fc(p.moneda,p.ingresos)}</td>
                    <td style={{fontSize:11,color:"#b1ada2"}}>{p.m2>0&&p.ingresos>0?fc(p.moneda,p.ingresos/p.m2):"—"}</td>
                    <td style={{color:"#2ecc71",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600,fontSize:12}}>{fc(p.moneda,p.neto)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div></div>
        )
      }
      {selected&&(
        <ProjectModal
          project={selected}
          onClose={()=>setSelected(null)}
          onUpdate={async(id,data)=>{await onUpdate(id,data);setSelected(p=>({...p,...data}));}}
          onDelete={onDelete}
          allProjects={projects}
          clients={clients}
          ferias={ferias}
        />
      )}
    </div>
  );
}

/* ── MAIN APP ── */
function App(){
  const{user,loading,login,logout}=useAuth();
  const projects=useCollection("projects");
  const clients=useCollection("clients");
  const ferias=useCollection("ferias");
  const[tab,setTab]=useState("dashboard");

  if(loading)return(<div style={{minHeight:"100vh",background:"#262626",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:18,letterSpacing:6,color:"#e5e3e0"}}>GALERIE</div></div>);
  if(!user)return<LoginScreen onLogin={login}/>;

  const handleSaveProject=async(data)=>{await projects.add(data);setTab("proyectos");};

  const TABS=[
    {id:"dashboard",   label:"Dashboard",       dot:"#f39c12"},
    {id:"proyectos",   label:"Proyectos",        dot:"#3498db"},
    {id:"presupuesto", label:"Nueva Cotización", dot:"#2ecc71"},
    {id:"ferias",      label:"Ferias",           dot:"#9b59b6"},
    {id:"clientes",    label:"Clientes",         dot:"#e67e22"},
  ];

  const activeCount=projects.data.filter(p=>!["completado","perdido"].includes(p.etapa)).length;

  return(
    <>
      <div className="sticky-shell">
        <header className="hdr">
          <div className="hdr-logo" onClick={()=>setTab("dashboard")}>GALERIE</div>
          <div className="hdr-right">
            {!projects.fbMode&&<div className="hdr-pill">MODO DEMO</div>}
            <div className="hdr-user">{user.email}</div>
            <button className="btn-logout" onClick={logout}>Salir</button>
          </div>
        </header>
        <nav className="nav">
          {TABS.map(t=>(
            <div key={t.id} className={`nav-item${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
              <div className="nav-dot" style={{background:tab===t.id?t.dot:"#3a3a3a"}}></div>
              {t.label}
            </div>
          ))}
        </nav>
      </div>

      <div className="hero">
        <div className="hero-ey">Galerie — Gestión de Proyectos</div>
        <h1 className="hero-title">
          {tab==="dashboard"&&"Dashboard General"}
          {tab==="proyectos"&&"Proyectos"}
          {tab==="presupuesto"&&"Nueva Cotización"}
          {tab==="ferias"&&"Ferias"}
          {tab==="clientes"&&"Clientes"}
        </h1>
        <div className="hero-sub">
          {tab==="dashboard"&&`${activeCount} proyectos activos · ${projects.data.filter(p=>p.etapa==="completado").length} completados · ${clients.data.length} clientes · ${ferias.data.length} ferias`}
          {tab==="proyectos"&&`${projects.data.length} proyectos registrados`}
          {tab==="presupuesto"&&"Calculadora con costos desde Montevideo · Uso interno Galerie"}
          {tab==="ferias"&&`${ferias.data.length} ferias registradas`}
          {tab==="clientes"&&`${clients.data.length} clientes registrados`}
        </div>
      </div>

      {tab==="dashboard"  &&<Dashboard projects={projects.data} ferias={ferias.data}/>}
      {tab==="proyectos"  &&<ProjectsList projects={projects.data} onUpdate={projects.update} onDelete={projects.remove} clients={clients.data} ferias={ferias.data}/>}
      {tab==="presupuesto"&&<div className="page"><BudgetCalc onSave={handleSaveProject} allProjects={projects.data} clients={clients.data} ferias={ferias.data}/></div>}
      {tab==="ferias"     &&<FeriasSection ferias={ferias} projects={projects.data}/>}
      {tab==="clientes"   &&<ClientsSection clients={clients}/>}

      <footer className="footer">
        <div className="footer-logo">GALERIE</div>
        <div className="footer-info">galerie-expo.com · Sistema de Gestión Interno{projects.fbMode?" · Firebase ●":""}</div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
